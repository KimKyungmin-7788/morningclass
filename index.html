<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Phosphor 벡터 아이콘 (디자인 v3) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/duotone/style.css">
<style>
@font-face{
  font-family:'KyoboHandwriting2019';
  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/KyoboHand.woff') format('woff');

}

  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2210-EF@1.0/EF_jejudoldam.woff2') format('woff2');
  font-weight:normal; font-display:swap;
}
@font-face{font-family:'Paperozi';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-1Thin.woff2') format('woff2');font-weight:100;font-display:swap}
@font-face{font-family:'Paperozi';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-2ExtraLight.woff2') format('woff2');font-weight:200;font-display:swap}
@font-face{font-family:'Paperozi';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-3Light.woff2') format('woff2');font-weight:300;font-display:swap}
@font-face{font-family:'Paperozi';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'Paperozi';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');font-weight:500;font-display:swap}
@font-face{font-family:'Paperozi';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');font-weight:600;font-display:swap}
@font-face{font-family:'Paperozi';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');font-weight:700;font-display:swap}
@font-face{font-family:'Paperozi';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');font-weight:800;font-display:swap}
@font-face{font-family:'Paperozi';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');font-weight:900;font-display:swap}
/* ── 1. Variables (v2.4 파스텔 디자인 시스템) ───────── */
:root{
  color-scheme: light;
  /* 파스텔 배경 */
  --bg-cream:#FFF8EC; --bg-mint:#E8F7EE; --bg-sky:#E8F4FD;
  --bg-pink:#FDECEF;  --bg-sun:#FFF6D6;
  /* 강조 (카테고리별 1색) */
  --acc-coral:#FF8A7A; --acc-sun:#FFC93C; --acc-grass:#6BCB77;
  --acc-sky:#5BB6FF;   --acc-purple:#B084EB;
  /* 호환 토큰 (기존 코드 유지용) */
  --primary:#5BB6FF; --primary-dark:#3F95DB;
  --secondary:#FFC93C; --success:#6BCB77; --danger:#FF6B6B;
  --bg:var(--bg-cream); --bg2:var(--bg-sky);
  --card:#FFFFFF; --card-empty:#FFFBF0;
  /* 텍스트 (네이비/틸 — 검정 회피) */
  --text:#1B3A57; --text-sub:#5A7A99;
  --overlay:rgba(27,58,87,.45);
  --popup-shadow:0 24px 60px rgba(27,58,87,.25);
  --card-shadow:0 6px 20px rgba(91,182,255,.12);
  --card-shadow-hover:0 12px 32px rgba(91,182,255,.22);
  --radius:24px; --radius-sm:16px;
  --fs-h1:clamp(26px,1.8vw,34px);
  --fs-card-title:clamp(20px,1.35vw,26px);
  --fs-body:clamp(18px,1.1vw,20px);
  --fs-small:16px;
  --fs-result:clamp(48px,4.5vw,84px);
  --fs-emoji-md:clamp(36px,3vw,56px);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Noto Sans KR','맑은 고딕',sans-serif;color:var(--text);background:linear-gradient(160deg,#dcedff 0%,#fdf2f0 52%,#e4f2dc 100%);min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:
  radial-gradient(620px 520px at 80% 6%, rgba(255,255,255,.55), transparent 62%),
  radial-gradient(440px 240px at 6% 16%, rgba(255,255,255,.5), transparent 62%),
  radial-gradient(60% 42% at 12% 110%, rgba(208,234,203,.55), transparent 72%),
  radial-gradient(70% 50% at 92% 114%, rgba(220,234,208,.5), transparent 72%)}
#app{position:relative;z-index:1}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:var(--text)}
:focus-visible{outline:3px solid var(--acc-sky);outline-offset:2px;border-radius:8px}
h1,h2,.popup-title,.card-title{font-family:'Jua','Noto Sans KR',sans-serif;letter-spacing:.5px}
header h1,header .school,header .date-card{font-family:'Paperozi','JejuStoneWall','Jua','Noto Sans KR',sans-serif !important;letter-spacing:.5px}

/* ── 1b. v2.4 신규 키프레임 ─────────────────────────── */
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes bounceIn{0%{transform:translateY(20px) scale(.92);opacity:0}60%{transform:translateY(-4px) scale(1.02);opacity:1}100%{transform:translateY(0) scale(1);opacity:1}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}75%{transform:rotate(-2deg)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 rgba(107,203,119,0)}50%{box-shadow:0 0 0 6px rgba(107,203,119,.35)}}
@keyframes nameFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.pop-tap:active{animation:pop .25s ease}
.wiggle{animation:wiggle .45s ease}
.handwriting{font-family:'KyoboHandwriting2019','Jua','Noto Sans KR',cursive !important;letter-spacing:.5px}

/* ── 2. Layout ────────────────────────────────────── */
#app{display:grid;grid-template-rows:auto 1fr auto;min-height:100vh;padding:14px 18px;gap:12px}
header{display:flex;align-items:center;gap:14px;padding:10px 18px;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);border-radius:var(--radius);box-shadow:var(--card-shadow);flex-wrap:wrap}
header h1{font-size:var(--fs-h1);font-weight:900;display:flex;align-items:center;gap:8px}
header .school{font-size:var(--fs-body);color:var(--text-sub);font-weight:500}
header .date-card{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#fff,#F0F8FF);padding:12px 22px;border-radius:18px;box-shadow:var(--card-shadow);cursor:pointer;font-size:22px;font-weight:800;color:var(--primary);border:2px solid rgba(91,182,255,.25);transition:.2s}
header .date-card:hover{transform:translateY(-2px);box-shadow:var(--card-shadow-hover)}
header .date-card .dow{color:var(--acc-coral);font-weight:900}
header .date-card .ico{font-size:20px}
/* 달력 팝업 */
.cal-pop{display:flex;flex-direction:column;gap:14px}
.cal-head{display:flex;align-items:center;justify-content:center;gap:12px;font-size:26px;font-weight:800;color:var(--primary)}
.cal-head button{width:44px;height:44px;border-radius:12px;background:#F0F4FF;font-size:20px;font-weight:900}
.cal-head button:hover{background:var(--primary);color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{text-align:center;font-weight:800;font-size:16px;color:var(--text-sub);padding:8px 0}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:20px;font-weight:700;cursor:pointer;background:#F8FAFF;transition:.15s}
.cal-day:hover{background:var(--primary);color:#fff;transform:scale(1.05)}
.cal-day.other{opacity:.3}
.cal-day.today{background:#FFF3D6;border:2px solid var(--secondary)}
.cal-day.selected{background:var(--primary);color:#fff;box-shadow:var(--card-shadow-hover)}
.cal-day.sun{color:var(--acc-coral)}
.cal-day.sat{color:var(--acc-sky)}
header .actions{display:flex;gap:8px;margin-left:auto}
header .actions button{width:48px;height:48px;border-radius:14px;background:#fff;font-size:22px;box-shadow:var(--card-shadow);transition:.2s;display:flex;align-items:center;justify-content:center}
header .actions button:hover{transform:translateY(-2px);box-shadow:var(--card-shadow-hover)}
header .actions button.primary{background:var(--success);color:#fff}

main{display:grid;grid-template-columns:0.7fr 1.4fr 1.4fr 0.7fr;gap:20px;min-height:0}
.col{display:flex;flex-direction:column;gap:14px;min-height:0}
/* 2·3열(시간표·감정)만 콘텐츠에 밀리지 않게 → 동일 폭 + 간격은 가운데서 확보 */
main>.col:nth-child(2),main>.col:nth-child(3){min-width:0}

footer{display:flex;align-items:center;gap:14px;padding:10px 18px;background:rgba(255,255,255,.6);backdrop-filter:blur(10px);border-radius:var(--radius)}
footer .progress-wrap{flex:1;height:14px;background:rgba(0,0,0,.06);border-radius:99px;overflow:hidden}
footer .progress-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--success));width:0%;transition:width .5s ease;border-radius:99px}
footer .status{font-weight:700;font-size:var(--fs-body);white-space:nowrap}
footer .status.done{color:var(--success)}


.subject-chip:active,.student-card:active,.meal-load-btn:active,.choice-item:active,.att-row button:active{animation:pop .25s ease}
.tt-slot.correct{animation:wiggle .45s ease}
.card-badge{animation:bounceIn .4s cubic-bezier(.34,1.56,.64,1)}
.card.touchable:hover{transform:translateY(-4px) scale(1.005)}
/* ── 3. Cards (v3 글래스모피즘) ────────────────────── */
.card{background:rgba(255,255,255,.62);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.9);border-radius:32px;padding:18px;box-shadow:0 10px 40px -12px rgba(160,175,200,.45);transition:.25s;display:flex;flex-direction:column;gap:10px;flex:1;min-height:0;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.55),transparent 55%);pointer-events:none;border-radius:inherit;z-index:0}
.card>*{position:relative;z-index:1}
.card.touchable{cursor:pointer}
.card.touchable:hover{transform:translateY(-3px);box-shadow:0 16px 44px -12px rgba(160,175,200,.55)}
/* empty 카드: 부드러운 회색 점선 */
.card.empty{background:rgba(255,255,255,.5);border:2px dashed #cbd5e1}
.card.empty .card-hint{color:var(--text-sub);font-weight:700}
.card.filled{border:1px solid rgba(255,255,255,.9)}
.card-title{font-size:var(--fs-card-title);font-weight:700;display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-badge{margin-left:auto;background:var(--success);color:#fff;font-size:15px;padding:4px 12px;border-radius:99px;font-weight:700;flex-shrink:0}
.card-hint{color:var(--text-sub);font-size:var(--fs-body);text-align:center;padding:14px 0;flex:1;display:flex;align-items:center;justify-content:center}
.card-result{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center}
.card-result .emoji{font-size:var(--fs-result);line-height:1}
.card-result .label{font-size:var(--fs-card-title);font-weight:700}
.card-result .sub{font-size:var(--fs-body);color:var(--text-sub)}

/* weather backgrounds */
.card.w-sunny{background:linear-gradient(135deg,#FFF9E0,#FFFFFF)}
.card.w-rain{background:linear-gradient(135deg,#E0F0FF,#FFFFFF)}
.card.w-snow{background:linear-gradient(135deg,#F0F4FA,#FFFFFF)}
.card.w-cloud{background:linear-gradient(135deg,#F5F5F5,#FFFFFF)}

/* dust backgrounds */
.card.d-0{background:linear-gradient(135deg,#E0F4FD,#FFFFFF)}
.card.d-1{background:linear-gradient(135deg,#E5F5E0,#FFFFFF)}
.card.d-2{background:linear-gradient(135deg,#FFF0DB,#FFFFFF)}
.card.d-3{background:linear-gradient(135deg,#FFE0E0,#FFFFFF)}

/* ── 4. Specific cards ────────────────────────────── */
/* attendance */
.attendance-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex:1;align-items:center}
.attendance-stat{text-align:center;padding:8px;border-radius:var(--radius-sm);background:#F8FAFF}
.attendance-stat .num{font-size:clamp(28px,2.4vw,42px);font-weight:900;color:var(--primary)}
.attendance-stat .lbl{font-size:16px;color:var(--text-sub);font-weight:500}
.attendance-stat.present .num{color:var(--success)}
.attendance-stat.late .num{color:var(--secondary)}
.attendance-stat.absent .num{color:var(--danger)}

/* timetable card preview - 위에서부터 정렬, 아기자기 */
.tt-preview{display:flex;flex-direction:column;gap:8px;flex:1;justify-content:flex-start;padding-top:6px}
.tt-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:linear-gradient(135deg,#F8FAFF,#FFFFFF);border-radius:14px;font-size:var(--fs-body);border:2px solid #E8F0FF;box-shadow:0 2px 6px rgba(91,182,255,.06);transition:.2s}
.tt-row:hover{transform:translateX(2px);box-shadow:0 4px 12px rgba(91,182,255,.15)}
.tt-row.empty{opacity:.55;border:2px dashed #C7D5EE;background:transparent;box-shadow:none}
.tt-row .num{font-weight:900;color:#fff;background:var(--acc-sky);padding:4px 10px;border-radius:99px;min-width:60px;text-align:center;font-size:15px;letter-spacing:.5px}
.tt-row.empty .num{background:#C7D5EE;color:#fff}
.tt-row:nth-child(1) .num{background:var(--acc-coral)}
.tt-row:nth-child(2) .num{background:var(--acc-sun);color:#7A5300}
.tt-row:nth-child(3) .num{background:var(--acc-grass)}
.tt-row:nth-child(4) .num{background:var(--acc-sky)}
.tt-row:nth-child(5) .num{background:var(--acc-purple)}
.tt-row:nth-child(6) .num{background:#FF8FB1}
.tt-row:nth-child(7) .num{background:#5BCFC9}
.tt-row .icon{font-size:24px;line-height:1}
.tt-row .name{font-weight:700;flex:1;color:var(--text);word-break:keep-all}
.tt-row .check{color:var(--success);font-weight:900;font-size:18px}
.tt-note-chip{font-family:'KyoboHandwriting2019','Jua',cursive;font-size:15px;font-weight:500;color:#7A5300;background:linear-gradient(135deg,#FFFBEB,#FFF3CC);border:1.5px dashed #E0B84A;border-radius:10px;padding:3px 10px;cursor:pointer;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.15s;line-height:1.3}
.tt-note-chip:hover{background:#FFF3CC;border-style:solid;transform:translateY(-1px)}
.tt-note-chip.empty{opacity:.5;font-size:13px;color:#999;border-color:#ccc;background:transparent}
.tt-row .name{flex:1}

/* meal */
.meal-load-btn{margin:auto;display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 32px;background:linear-gradient(135deg,var(--acc-sun),var(--acc-coral));color:#fff;border-radius:24px;font-size:clamp(22px,1.6vw,28px);font-weight:700;box-shadow:0 10px 24px rgba(255,138,122,.35);text-shadow:0 1px 2px rgba(0,0,0,.1);transition:.2s;min-width:200px;min-height:80px}
.meal-load-btn:hover{transform:scale(1.05);box-shadow:0 12px 30px rgba(79,134,198,.45)}
.meal-load-btn .ico{font-size:40px}
.meal-loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.meal-loading .spinner{font-size:56px;animation:bounce 1s infinite}
.meal-loading .text{font-size:var(--fs-body);color:var(--text-sub);font-weight:600}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.meal-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:6px}
.meal-item{padding:10px 14px;background:linear-gradient(135deg,#FFF8E8,#FFFDF4);border-radius:14px;font-size:clamp(14px,1.15vw,20px);font-weight:700;border-left:4px solid var(--acc-sun);box-shadow:0 2px 8px rgba(255,201,60,.12);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0;transform:translateY(8px);animation:fadeUp .3s forwards}
.meal-actions{display:flex;gap:8px;margin-top:6px}
.meal-actions button{flex:1;padding:10px;border-radius:10px;background:#F8FAFF;font-weight:600;font-size:18px;border:2px solid transparent;transition:.2s}
.meal-actions button:hover{border-color:var(--primary);background:#fff}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* students grid - 3열 고정, 더 크고 직관적 */
.students-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;flex:1;overflow:hidden;padding:6px;align-content:start}
.student-card{background:#F8FAFF;border:3px dashed #C7D5EE;border-radius:20px;padding:14px 8px;text-align:center;cursor:pointer;transition:.2s;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:6px;box-shadow:0 2px 10px rgba(91,182,255,.08)}
.student-card:hover{transform:translateY(-3px) scale(1.04);border-color:var(--primary);box-shadow:var(--card-shadow-hover)}
.student-card.filled{background:linear-gradient(135deg,#FFFFFF,#F0FFF4);border:3px solid var(--success);box-shadow:0 4px 16px rgba(107,203,119,.28)}
.student-card .em{font-size:clamp(40px,3.6vw,60px);line-height:1}
.student-card .nm{font-size:clamp(17px,1.3vw,22px);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* notes - 손글씨 폰트, 컴팩트 */
.notes-display{flex:1;display:flex;align-items:center;justify-content:center;font-family:'KyoboHandwriting2019','Jua','Noto Sans KR',cursive;font-size:clamp(16px,1.2vw,20px);font-weight:600;line-height:1.4;text-align:center;white-space:pre-wrap;padding:6px;color:var(--text);overflow:auto;word-break:break-word}
.notes-edit-btn{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.9);font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:var(--card-shadow)}

/* book - 컴팩트 바로가기 */
.book-shortcut{display:flex;align-items:center;gap:10px;padding:6px;background:linear-gradient(135deg,#FDECEF,#FFFFFF);border-radius:14px;flex:1;cursor:pointer;transition:.2s}
.book-shortcut:hover{transform:translateX(2px);box-shadow:var(--card-shadow-hover)}
.book-mini{width:54px;height:54px;border-radius:10px;background:#000;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;flex-shrink:0}
.book-mini-empty{background:#EEF2F8;color:#AFC2DA;border:2px dashed #CBD8E8}
.book-info{flex:1;min-width:0}
.book-label{font-size:13px;color:var(--text-sub);font-weight:600}
.book-title-mini{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-arrow{font-size:18px;color:var(--acc-coral);font-weight:900}

/* helper (오늘의 도우미 뽑기) */
.helper-winners{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.helper-winner{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#FFF6D6,#FFFFFF);border:2px solid var(--secondary);border-radius:16px;padding:8px 16px;font-weight:800;font-size:clamp(18px,1.4vw,24px);box-shadow:0 4px 12px rgba(255,201,60,.2)}
.helper-winner .hw-em{font-size:1.3em;line-height:1}
.helper-winner.big{font-size:clamp(24px,2.2vw,38px);padding:14px 26px}
.helper-winner.rolling{border-color:var(--acc-sky);background:linear-gradient(135deg,#E8F4FD,#FFFFFF)}
.helper-winner.big:not(.rolling){animation:hwPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes hwPop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.helper-stage{min-height:150px;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:12px;margin:18px 0;padding:14px;background:#F8FAFF;border-radius:18px}
.helper-placeholder{text-align:center;font-size:22px;color:var(--text-sub);font-weight:700;line-height:1.5}
.helper-setup{text-align:center}
.helper-count-label{font-size:18px;font-weight:700;margin-bottom:10px}
.helper-count{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.hc-btn{padding:10px 18px;border-radius:12px;background:#F0F4FF;font-weight:700;font-size:17px;transition:.15s}
.hc-btn.active{background:var(--primary);color:#fff}
.helper-pool-note{font-size:14px;color:var(--text-sub);margin-top:8px}

/* ── v3 디자인 시안 (글래스모피즘 · Phosphor) ─────────── */
.card.v3{background:rgba(255,255,255,.62);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.9);box-shadow:0 10px 40px -12px rgba(160,175,200,.45);border-radius:32px}
.card.v3.filled{border:1px solid rgba(255,255,255,.9)}
.card.v3.empty{background:rgba(255,255,255,.5);border:2px dashed #cbd5e1}
.card.v3::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.55),transparent 55%);pointer-events:none;border-radius:inherit;z-index:0;opacity:1}
.card.v3.empty.touchable:hover::before{opacity:1}
.card.v3>*{position:relative;z-index:1}
.v3-title{display:flex;align-items:center;gap:9px;font-family:'Jua','Noto Sans KR',sans-serif;font-size:clamp(18px,1.15vw,23px);font-weight:700;color:#4a5568;letter-spacing:.2px;line-height:1.2;word-break:keep-all}
.v3-ico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.v3-check{margin-left:auto;width:26px;height:26px;border-radius:50%;background:#68d391;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 6px rgba(104,211,145,.45);flex-shrink:0}
.v3-weather-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin:6px 0}
.v3-weather-wrap::before{content:'';position:absolute;width:70px;height:70px;border-radius:50%;background:currentColor;filter:blur(22px);opacity:.35}
.v3-weather-ico{font-size:76px;position:relative;z-index:1;filter:drop-shadow(0 6px 10px rgba(0,0,0,.12))}
.v3-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex:1;align-items:stretch}
.v3-stat{background:rgba(255,255,255,.9);border:1px solid #f1f5f9;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.04);padding:8px}
.v3-stat .n{font-family:'Nunito',sans-serif;font-size:clamp(28px,2.4vw,42px);font-weight:800;line-height:1}
.v3-stat .l{font-size:12px;font-weight:700;color:#64748b;margin-top:5px}
.v3-stat.p .n{color:#10b981}.v3-stat.t .n{color:#f59e0b}.v3-stat.a .n{color:#ef4444}
.v3-sub{text-align:center;color:#94a3b8;font-size:13px;font-weight:600;margin-top:8px}
.v3-pill{font-size:13px;color:#64748b;background:rgba(255,255,255,.75);padding:5px 14px;border-radius:99px;box-shadow:0 1px 4px rgba(0,0,0,.05);font-weight:600}
.v3-check.gray{background:#cbd5e1}
.v3-badge{margin-left:auto;background:#22c55e;color:#fff;font-size:13px;padding:4px 12px;border-radius:99px;font-weight:700;display:flex;align-items:center;gap:5px;box-shadow:0 2px 6px rgba(34,197,94,.3);flex-shrink:0}
.v3-reload{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.85);color:#16a34a;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 6px rgba(0,0,0,.06);margin-left:8px;flex-shrink:0;position:static}
.v3-reload:hover{background:#fff}
.meal-item{display:flex;align-items:center;gap:10px}
.mi-ico{width:28px;height:28px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;color:#d97706;font-size:15px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex-shrink:0}
/* 헤더/로고/아이콘 마감 */
.logo-ico{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#ff9a9e,#fecfef);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:inset 0 2px 4px rgba(255,255,255,.55);flex-shrink:0}
header .actions button{color:#94a3b8}
header .actions button:hover{color:var(--primary)}
header .actions button.primary{color:#fff}
header .date-card .ico{color:var(--acc-coral);display:inline-flex;align-items:center}
.helper-winner .hw-em i{color:#eab308}
.book-label i{color:#3b82f6}
.book-arrow i{color:var(--acc-coral)}
/* D-DAY */
.dday-list{display:flex;flex-direction:column;gap:8px;flex:1;overflow-y:auto;padding:2px}
.dday-row{display:flex;align-items:center;gap:12px;padding:11px 14px;background:rgba(255,255,255,.82);border-radius:14px;box-shadow:0 2px 8px rgba(99,102,241,.08);border-left:4px solid #6366f1}
.dday-row:has(.dday-badge.today){border-left-color:#ef4444}
.dday-row:has(.dday-badge.past){border-left-color:#cbd5e1}
.dday-badge{font-family:'Nunito',sans-serif;font-weight:900;font-size:19px;color:#fff;background:#6366f1;padding:5px 15px;border-radius:99px;min-width:72px;text-align:center;flex-shrink:0;letter-spacing:.3px;box-shadow:0 2px 6px rgba(99,102,241,.3)}
.dday-badge.today{background:#ef4444;box-shadow:0 2px 6px rgba(239,68,68,.35)}
.dday-badge.past{background:#94a3b8;box-shadow:none}
.dday-name{flex:1;font-weight:800;font-size:18px;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dday-date{font-size:13px;font-weight:600;color:#94a3b8;flex-shrink:0}
.dday-del{color:#cbd5e1;font-weight:800;padding:2px 7px;border-radius:6px;flex-shrink:0}
.dday-del:hover{background:var(--danger);color:#fff}
/* D-DAY 관리 팝업: 항목을 2열로 배치 */
.dday-list-manage{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;align-content:start;overflow:visible}
.dday-list-manage .card-hint{grid-column:1/-1}
.dday-add{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;position:sticky;top:0;background:var(--card);z-index:2;padding-bottom:10px}
.dday-add input{padding:11px 13px;border:2px solid #E5E7EB;border-radius:12px;font-size:15px}
.dday-add input:focus{border-color:var(--primary);outline:none}
.dday-add input.name{flex:1;min-width:120px}
.dday-add button{padding:11px 18px;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;white-space:nowrap}

/* ── 5. Popup ─────────────────────────────────────── */
.popup-overlay{position:fixed;inset:0;background:var(--overlay);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.popup-overlay.active{display:flex}
.popup-overlay.closing{animation:fadeOut .2s forwards}
.popup-card{background:var(--card);border-radius:24px;padding:30px;max-width:760px;width:100%;max-height:90vh;box-shadow:var(--popup-shadow);animation:bounceIn .4s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;overflow:hidden}
.popup-overlay.closing .popup-card{animation:popupOut .2s forwards}
.popup-card.large{max-width:1100px}
.popup-header{display:flex;align-items:center;margin-bottom:20px;gap:12px;flex-shrink:0}
#popup-body{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden}
.popup-title{font-size:clamp(22px,1.6vw,30px);font-weight:700;color:var(--primary);flex:1}
.popup-close{width:42px;height:42px;border-radius:12px;background:#F0F4FF;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:.2s}
.popup-close:hover{background:var(--danger);color:#fff}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{to{opacity:0}}
@keyframes popupIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes popupOut{to{transform:scale(.9);opacity:0}}

/* 위치 기반 자동 조회 버튼 */
.auto-fetch-btn{width:100%;margin-bottom:16px;padding:14px;border-radius:16px;background:linear-gradient(135deg,var(--acc-sky),var(--primary));color:#fff;font-weight:700;font-size:18px;box-shadow:0 6px 16px rgba(91,182,255,.3);transition:.2s}
.auto-fetch-btn:hover{transform:translateY(-2px);box-shadow:var(--card-shadow-hover)}
.auto-fetch-btn:disabled{opacity:.7;cursor:wait;transform:none}
.choice-divider{text-align:center;color:var(--text-sub);font-size:14px;font-weight:600;margin:2px 0 12px}

/* choice grid (weather/dust/emotion) */
.choice-grid{display:grid;gap:14px}
.choice-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.choice-grid.cols-4{grid-template-columns:repeat(4,1fr)}
.choice-item{background:#F8FAFF;border:3px solid transparent;border-radius:18px;padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:.15s;min-height:120px;justify-content:center}
.choice-item:hover{transform:translateY(-3px);border-color:var(--primary);background:#fff}
.choice-item .em{font-size:56px;line-height:1}
.choice-item .lb{font-size:20px;font-weight:700}
.choice-item .sb{font-size:15px;color:var(--text-sub)}
.choice-item.dust-0{background:#E1F5FE}.choice-item.dust-1{background:#E8F5E9}
.choice-item.dust-2{background:#FFF3E0}.choice-item.dust-3{background:#FFEBEE}

/* attendance popup */
.att-list{display:flex;flex-direction:column;gap:10px}
.att-row{display:flex;align-items:center;gap:12px;padding:12px;background:#F8FAFF;border-radius:14px;border:2px solid transparent}
.att-row.present{background:#E8F5E9;border-color:var(--success)}
.att-row.late{background:#FFF3E0;border-color:var(--secondary)}
.att-row.absent{background:#FFEBEE;border-color:var(--danger)}
.att-row .nm{flex:1;font-size:18px;font-weight:600}
.att-row button{padding:12px 18px;border-radius:16px;background:#fff;font-weight:700;font-size:18px;border:2px solid #E5E7EB;transition:.15s;min-width:70px}
.att-row button.active.p{background:var(--success);color:#fff;border-color:var(--success)}
.att-row button.active.l{background:var(--secondary);color:#fff;border-color:var(--secondary)}
.att-row button.active.a{background:var(--danger);color:#fff;border-color:var(--danger)}
.att-toolbar{display:flex;gap:10px;margin-bottom:14px}
.att-toolbar button{flex:1;padding:14px;border-radius:16px;background:#F0F4FF;font-weight:700;font-size:18px;transition:.2s}
.att-toolbar button:hover{background:var(--primary);color:#fff}

/* timetable popup (drag&drop) */
.tt-popup{display:grid;grid-template-columns:1fr 1fr;gap:20px;min-height:400px}
.tt-slots,.tt-bank{display:flex;flex-direction:column;gap:8px}
.tt-section-title{font-size:18px;font-weight:700;color:var(--text-sub);margin-bottom:4px}
.tt-slot{display:flex;align-items:center;gap:10px;padding:10px;background:#F8FAFF;border:2px dashed #C7D5EE;border-radius:12px;min-height:60px;transition:.15s}
.tt-slot.drag-over{background:#FFF8E0;border-color:var(--secondary);border-style:solid}
.tt-slot.correct{background:#E8F5E9;border:2px solid var(--success);border-style:solid}
.tt-slot.shake{animation:shake .3s}
.tt-slot .pnum{font-weight:900;color:var(--acc-sky);min-width:54px;font-size:20px}
.tt-slot .drop-zone{flex:1;min-height:44px;display:flex;align-items:center;gap:8px}
.tt-slot.correct .check{color:var(--success);font-size:22px;font-weight:900}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.tt-bank-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;background:#F8FAFF;border-radius:14px;flex:1;align-content:start;min-height:200px;max-height:480px;overflow-y:auto}
.subject-chip{padding:14px 10px;background:#fff;border:2px solid rgba(91,182,255,.5);border-radius:16px;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:700;font-size:18px;color:var(--text);cursor:grab;user-select:none;touch-action:none;transition:.15s;min-height:54px}
.subject-chip:hover{transform:translateY(-2px);box-shadow:var(--card-shadow-hover)}
.subject-chip.dragging{opacity:.4;transform:rotate(2deg) scale(1.05)}
.subject-chip .ico{font-size:22px}
.subject-chip.ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.85;transform:rotate(3deg);box-shadow:0 12px 30px rgba(0,0,0,.25)}
.subject-chip.add-chip{border-style:dashed;border-color:var(--secondary);color:var(--secondary);cursor:pointer}
.subject-chip.add-chip:hover{background:#FFF8E0}
.slot-clear{background:#FFE5E5;color:var(--danger);border-radius:50%;width:28px;height:28px;font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.slot-clear:hover{background:var(--danger);color:#fff}
.tt-popup-actions{display:flex;gap:10px;margin-top:18px;padding-top:18px;border-top:2px solid #F0F4FF;position:sticky;bottom:0;background:var(--card);z-index:3}
.tt-popup-actions button{flex:1;padding:14px;border-radius:14px;font-weight:700;font-size:17px;transition:.2s}
.btn-hint{background:#FFF8E0;color:var(--secondary)}
.btn-hint:hover{background:var(--secondary);color:#fff}
.btn-done{background:var(--success);color:#fff}
.btn-done:hover{background:#5BB867}
.btn-done:disabled{background:#E5E7EB;color:#999;cursor:not-allowed}

/* notes popup */
.notes-textarea{width:100%;min-height:200px;padding:16px;border:2px solid #E5E7EB;border-radius:14px;font-size:18px;line-height:1.5;resize:vertical;font-family:inherit}
.notes-textarea:focus{border-color:var(--primary);outline:none}
.popup-actions{display:flex;gap:10px;margin-top:16px;position:sticky;bottom:0;background:var(--card);padding-top:14px;z-index:3;box-shadow:0 -10px 18px -12px rgba(0,0,0,.18)}
.popup-actions button{flex:1;padding:14px;border-radius:14px;font-weight:700;font-size:17px;transition:.2s}
.btn-save{background:var(--success);color:#fff}.btn-save:hover{background:#5BB867}
.btn-cancel{background:#F0F4FF;color:var(--text-sub)}.btn-cancel:hover{background:#E5E7EB}

/* settings modal */
.settings-modal{display:grid;grid-template-columns:200px 1fr;gap:20px;min-height:500px;max-height:80vh}
.settings-tabs{display:flex;flex-direction:column;gap:4px;border-right:2px solid #F0F4FF;padding-right:12px}
.settings-tab{padding:12px 14px;border-radius:10px;font-weight:600;font-size:15px;text-align:left;color:var(--text-sub);transition:.15s}
.settings-tab:hover{background:#F8FAFF}
.settings-tab.active{background:var(--primary);color:#fff}
.settings-content{overflow-y:auto;padding-right:8px}
.settings-section{display:none}
.settings-section.active{display:block}
.settings-section h3{font-size:20px;font-weight:700;margin-bottom:14px;color:var(--primary)}
.field{margin-bottom:14px}
.field label{display:block;font-weight:600;margin-bottom:6px;font-size:15px}
.field input,.field textarea,.field select{width:100%;padding:10px 14px;border:2px solid #E5E7EB;border-radius:10px;font-size:15px}
.field input:focus,.field textarea:focus{border-color:var(--primary);outline:none}
.field textarea{min-height:100px;resize:vertical;font-family:inherit}
.field .hint{font-size:13px;color:var(--text-sub);margin-top:4px}
.class-switcher{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0}
.class-chip{padding:7px 14px;border-radius:999px;border:1.5px solid #dfe6f5;background:#fff;cursor:pointer;font-size:13px;font-weight:700;color:#5a6478;transition:.15s}
.class-chip:hover{border-color:var(--primary);color:var(--primary)}
.class-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.class-chip.add{border-style:dashed;color:var(--primary);border-color:var(--primary)}
.class-pick-list{display:flex;flex-direction:column;gap:10px}
.class-pick-btn{display:flex;flex-direction:column;align-items:flex-start;gap:2px;width:100%;padding:16px 20px;border-radius:16px;border:2px solid #e5e9f2;background:#fff;cursor:pointer;text-align:left;transition:.15s}
.class-pick-btn:hover{border-color:var(--primary);background:#f5faff;transform:translateY(-2px);box-shadow:0 6px 18px rgba(91,182,255,.18)}
.class-pick-btn.current{border-color:var(--primary);background:#eef7ff}
.class-pick-btn .cp-name{font-size:20px;font-weight:800;color:#1e293b}
.class-pick-btn .cp-school{font-size:14px;font-weight:600;color:#94a3b8}
.tt-day-tabs{display:flex;gap:6px;margin-bottom:12px}
.tt-day-tabs button{flex:1;padding:8px;border-radius:8px;background:#F0F4FF;font-weight:600;font-size:14px}
.tt-day-tabs button.active{background:var(--primary);color:#fff}
.tt-period-row{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.tt-period-row .lbl{font-weight:700;color:var(--primary);min-width:50px;font-size:14px}
.tt-period-row input{flex:1}
.copy-day-btn{padding:8px 14px;border-radius:8px;background:#FFF8E0;color:var(--secondary);font-weight:600;font-size:13px;margin-top:8px}
.student-list-item{display:flex;gap:6px;align-items:center;padding:8px;background:#F8FAFF;border-radius:8px;margin-bottom:4px}
.student-list-item .nm{flex:1;font-weight:600}
.student-list-item button{padding:6px 10px;border-radius:6px;background:#fff;font-size:13px;font-weight:600}
.student-list-item button:hover{background:var(--primary);color:#fff}
.student-list-item button.del:hover{background:var(--danger)}
.btn-test{padding:10px 16px;border-radius:10px;background:var(--secondary);color:#fff;font-weight:700;font-size:14px;margin-top:6px}
#school-search-results{margin-top:8px;display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto}
.school-result{padding:10px 12px;background:#F8FAFF;border:2px solid #E5E7EB;border-radius:10px;cursor:pointer;transition:.15s}
.school-result:hover{border-color:var(--primary);background:#fff;transform:translateY(-1px)}
.school-result .sr-name{font-weight:700;font-size:15px;color:var(--text)}
.school-result .sr-addr{font-size:13px;color:var(--text-sub);margin-top:2px}
.test-result{margin-top:10px;padding:12px;background:#F8FAFF;border-radius:10px;font-size:14px;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.settings-footer{display:flex;gap:10px;padding-top:16px;margin-top:16px;border-top:2px solid #F0F4FF;grid-column:1/-1}
.settings-footer button{padding:12px 24px;border-radius:12px;font-weight:700;font-size:16px;flex:1}

/* records */
.records-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;max-height:50vh;overflow-y:auto;padding:4px}
.record-item{padding:14px;background:#F8FAFF;border-radius:12px;cursor:pointer;transition:.15s;border:2px solid transparent}
.record-item:hover{border-color:var(--primary);background:#fff}
.record-item .dt{font-weight:700;font-size:15px;color:var(--primary)}
.record-item .sm{font-size:13px;color:var(--text-sub);margin-top:4px}
.record-detail{padding:14px;background:#F8FAFF;border-radius:14px}
.record-detail h4{margin:14px 0 6px;font-size:15px;color:var(--primary)}
.record-detail .row{font-size:14px;margin:3px 0}

/* toast */
.toast-container{position:fixed;top:30px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:14px 22px;border-radius:14px;font-weight:600;font-size:16px;box-shadow:var(--popup-shadow);animation:toastIn .3s,toastOut .3s 2.2s forwards;pointer-events:auto}
.toast.success{background:var(--success)}.toast.error{background:var(--danger)}
@keyframes toastIn{from{transform:translateY(-30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toastOut{to{transform:translateY(-30px);opacity:0}}

/* celebration */
.celebrate-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:1500;pointer-events:none}
.celebrate-overlay.active{display:flex}
.celebrate-msg{font-size:clamp(36px,4vw,64px);font-weight:900;color:var(--primary);background:#fff;padding:30px 60px;border-radius:30px;box-shadow:var(--popup-shadow);animation:celebrateIn .5s}
@keyframes celebrateIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes particleFall{to{transform:translateY(110vh) rotate(540deg);opacity:.3}}

/* 데이터 안심 안내 박스 (2열 1:1 좌우 배치) */
.data-notice{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;align-items:stretch}
.data-notice .dn-row{display:flex;flex-direction:column;gap:6px;align-items:center;text-align:center;font-size:12.5px;line-height:1.4;padding:12px;border-radius:12px}
.data-notice .dn-ico{font-size:28px;line-height:1;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.data-notice .dn-ico svg{width:36px;height:36px;display:block}
.data-notice .dn-row.safe{background:#E8F7EE;color:#1B5E37;border:1.5px solid #B7E4C7}
.data-notice .dn-row.warn{background:#FFF6D6;color:#7A5300;border:1.5px solid #F0D98A}
/* 데이터 통계 칩 */
.data-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.dstat{background:#F8FAFF;border-radius:12px;padding:10px 8px;text-align:center}
.dstat-num{font-size:20px;font-weight:900;color:var(--primary);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dstat-lbl{font-size:12px;color:var(--text-sub);margin-top:2px}
/* 데이터 액션 버튼 */
.data-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.data-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:12px;font-weight:700;font-size:15px;background:#F0F4FF;color:var(--text);border:2px solid transparent;transition:.15s}
.data-btn:hover{border-color:var(--primary);background:#fff}
.data-btn .da-ico{font-size:18px}
.data-btn.primary{background:var(--success);color:#fff}
.data-btn.primary:hover{background:#5BB867;border-color:transparent}
.data-btn.danger-ghost{width:100%;background:transparent;color:var(--danger);border:2px dashed #F3B4B4;font-size:14px}
.data-btn.danger-ghost:hover{background:#FFECEC;border-style:solid;border-color:var(--danger)}
.data-btn .da-sub{font-size:12px;color:var(--text-sub);font-weight:600}

/* 백업 리마인더 배너 */
.backup-reminder{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:2500;display:flex;align-items:center;gap:14px;background:#fff;border:2px solid var(--secondary);border-radius:18px;padding:14px 18px;box-shadow:var(--popup-shadow);max-width:min(92vw,620px);animation:bounceIn .4s cubic-bezier(.34,1.56,.64,1)}
.backup-reminder .br-ico{font-size:30px;line-height:1}
.backup-reminder .br-text{flex:1;font-size:15px;line-height:1.35}
.backup-reminder .br-sub{color:var(--text-sub);font-size:13px}
.backup-reminder .br-backup{padding:10px 16px;border-radius:12px;background:var(--success);color:#fff;font-weight:700;white-space:nowrap}
.backup-reminder .br-backup:hover{background:#5BB867}
.backup-reminder .br-later{padding:10px 12px;border-radius:12px;background:#F0F4FF;color:var(--text-sub);font-weight:600;white-space:nowrap}
.backup-reminder .br-later:hover{background:#E5E7EB}
@media print{.backup-reminder{display:none!important}}

/* 영상 재생 플로팅 창 (비모달) */
.video-window{position:fixed;z-index:900;top:50%;left:50%;transform:translate(-50%,-50%);width:min(94vw,760px);height:min(90vh,600px);background:var(--card);border-radius:20px;box-shadow:var(--popup-shadow);display:flex;flex-direction:column;overflow:hidden;animation:bounceIn .35s cubic-bezier(.34,1.56,.64,1)}
.vw-header{display:flex;align-items:center;gap:8px;padding:12px 16px;background:linear-gradient(135deg,#fff,#F0F8FF);border-bottom:2px solid #EAF2FF}
.vw-title{font-family:'Jua','Noto Sans KR',sans-serif;font-size:20px;font-weight:700;color:var(--primary);flex:1;display:flex;align-items:center;gap:8px}
.vw-btn{width:36px;height:36px;border-radius:10px;background:#F0F4FF;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s;position:relative;flex-shrink:0}
.vw-btn:hover{background:var(--primary);color:#fff}
.vw-btn.close:hover{background:var(--danger)}
.vw-badge{position:absolute;top:-4px;right:-4px;background:var(--acc-coral);color:#fff;font-size:11px;font-weight:800;min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.vw-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;flex:1;min-height:0}
.vw-url{width:100%;padding:11px 14px;border:2px solid #E5E7EB;border-radius:12px;font-size:15px}
.vw-url:focus{border-color:var(--primary);outline:none}
.vw-player{position:relative;width:100%;flex:1;min-height:0;background:#000;border-radius:12px;overflow:hidden}
.vw-player iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.vw-player .vw-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#F8FAFF;color:var(--text-sub);font-size:16px;font-weight:600;text-align:center;padding:16px}
.vw-player .vw-empty>:first-child{font-size:44px}
.vw-note{font-size:12px;color:var(--text-sub);text-align:center}
.vw-open-yt{color:var(--acc-coral);font-weight:700;text-decoration:none}
.vw-open-yt:hover{text-decoration:underline}
.vw-list-head{display:flex;align-items:center;gap:10px}
.vw-list-count{flex:1;text-align:center;font-size:14px;color:var(--text-sub);font-weight:700}
.vw-list-count b{color:var(--acc-coral)}
.vw-clear-all{font-size:13px;color:var(--text-sub);font-weight:600;padding:6px 10px;border-radius:8px}
.vw-clear-all:hover{color:var(--danger);background:#FFECEC}
.vw-list{display:flex;flex-direction:column;gap:6px;flex:1;min-height:0;overflow-y:auto;padding:2px}
.vw-item{display:flex;align-items:center;gap:10px;padding:11px 13px;background:#FFF9E0;border-radius:10px;cursor:pointer;transition:.15s}

.vw-item .vi-time{font-size:12px;color:var(--text-sub);white-space:nowrap}
.vw-item .vi-del{color:var(--text-sub);font-weight:800;padding:2px 7px;border-radius:6px;flex-shrink:0}
.vw-item .vi-del:hover{background:var(--danger);color:#fff}
.vw-empty-list{text-align:center;color:var(--text-sub);padding:34px;font-weight:600}
@media print{.video-window{display:none!important}}

/* sr-only */

.welcome h2{font-size:28px;margin-bottom:14px;color:var(--primary)}

<script>
'use strict';

const SUBJECT_ICONS = {
  '국어':'📚','영어':'📚','수학':'🔢','도덕':'💖',
  '체육':'⚽','음악':'🎵','미술':'🎨','과학':'🔬',
  '사회':'🌍','직업':'🔧','창체':'🎭','진로':'🧭',
  '진로와직업':'🧰','자율':'🌱','동아리':'🤝'
};
const subjectIcon = n => SUBJECT_ICONS[n?.trim()] || '📖';
// HTML/속성 안전 이스케이프 — 학생 이름·교과명 등 사용자 입력값을 innerHTML에 넣을 때 사용
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const DEFAULT_SUBJECTS = ['국어','수학','사회','과학','음악','미술','체육','진로와직업','진로','자율','동아리'];
const MAX_TIMETABLE_PERIODS = 7;
// NEIS 급식 API 키는 코드에 두지 않음.
// 배포(Vercel): 서버리스 함수 /api/neis 가 환경변수 NEIS_KEY 로 처리 → 브라우저·저장소에 키 노출 없음.
// 로컬/개인용: window.__NEIS_KEY__ 또는 설정값이 있으면 직접 호출로 폴백.
const DEFAULT_NEIS_KEY = (typeof window !== 'undefined' && window.__NEIS_KEY__) || '';
const neisKey = () => (App.settings && App.settings.neisKey) || DEFAULT_NEIS_KEY;
const getCustomSubjects = () => { try { return JSON.parse(localStorage.getItem('mc_custom_subjects')||'[]'); } catch(e){ return []; } };
const addCustomSubject = (name) => {
  const list = getCustomSubjects();
  if (!list.includes(name) && !DEFAULT_SUBJECTS.includes(name)) {
    list.push(name);
    localStorage.setItem('mc_custom_subjects', JSON.stringify(list));
  }
};

const WEATHER = [
  {emoji:'☀️',label:'맑음',cls:'w-sunny'},{emoji:'⛅',label:'구름조금',cls:'w-cloud'},
  {emoji:'☁️',label:'흐림',cls:'w-cloud'},{emoji:'🌧️',label:'비',cls:'w-rain'},
  {emoji:'⛈️',label:'천둥번개',cls:'w-rain'},{emoji:'❄️',label:'눈',cls:'w-snow'}
];
const DUST = [
  {emoji:'😁',label:'좋음',hint:'마스크 안 써도 돼요',level:0},
  {emoji:'🌿',label:'보통',hint:'평소처럼 활동해요',level:1},
  {emoji:'😷',label:'나쁨',hint:'마스크를 써요',level:2},
  {emoji:'⚠️',label:'매우나쁨',hint:'실외활동 주의해요',level:3}
];
const EMOTIONS = [
  {e:'😊',l:'기쁨'},{e:'😢',l:'슬픔'},{e:'😡',l:'화남'},{e:'😴',l:'피곤'},
  {e:'😆',l:'신남'},{e:'😰',l:'불안'},{e:'😑',l:'그냥'},{e:'🤢',l:'아픔'}
];

const App = {
  audio: null, muted: false, currentOnClose: null,
  prevFocus: null, celebratedToday: false,
  ttsVoices: [], ttsLastText: '', ttsLastAt: 0,
  settings: null, today: '', todayKey: '', dayOfWeek: 0, isWeekend: false,
  record: null, settingsTab: 'info', settingsDay: 0, settingsDraft: null,
  classes: null, currentClassId: null,

  init() {
    if ('speechSynthesis' in window) { try { this.ttsVoices = window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged = ()=>{ this.ttsVoices = window.speechSynthesis.getVoices(); }; } catch(e){} }
    this.muted = localStorage.getItem('mc_muted') === '1';
    document.getElementById('btn-mute').innerHTML = `<i class="ph-fill ph-speaker-${this.muted?'slash':'high'}"></i>`;
    this.loadDate();
    this.loadSettings();
    this.loadRecord();
    this.bindGlobal();
    this.renderAll();
    if (this.classes && this.classes.length > 1) {
      this.openClassPicker();                                    // 여러 학급이면 첫 접속 시 학급 선택
    } else if (!this.settings || !this.settings.students?.length) {
      this.openWelcome();
    } else {
      setTimeout(()=>this.checkBackupReminder(), 700);
    }
  },

  // ── 백업 리마인더 (무심코 데이터 삭제 방지) ──
  checkBackupReminder() {
    try {
      const students = this.settings?.students || [];
      const recordCount = Object.keys(localStorage).filter(k=>k.startsWith('mc_record_')).length;
      if (!students.length || recordCount < 1) return;                 // 백업할 데이터가 아직 없음
      if (localStorage.getItem('mc_backup_snooze') === this.todayKey) return; // 오늘은 이미 미룸
      const last = localStorage.getItem('mc_last_backup');
      const days = last ? (Date.now() - new Date(last).getTime())/86400000 : Infinity;
      if (days < 7) return;
      this.showBackupReminder(last, days);
    } catch(e){}
  },
  showBackupReminder(last, days) {
    if (document.getElementById('backup-reminder')) return;
    const when = last ? `${Math.floor(days)}일째 백업을 안 했어요` : '아직 파일 백업을 한 번도 안 했어요';
    const el = document.createElement('div');
    el.id = 'backup-reminder';
    el.className = 'backup-reminder';
    el.setAttribute('role','status');
    el.innerHTML = `<span class="br-ico">💾</span>
      <div class="br-text"><b>기록을 파일로 안전하게 보관하세요</b><br><span class="br-sub">${when}. 브라우저 데이터가 지워지면 복구할 수 없어요.</span></div>
      <button class="br-backup" id="br-backup">📤 백업하기</button>
      <button class="br-later" id="br-later">나중에</button>`;
    document.body.appendChild(el);
    document.getElementById('br-backup').onclick = ()=>{ this.exportData(); el.remove(); };
    document.getElementById('br-later').onclick = ()=>{ localStorage.setItem('mc_backup_snooze', this.todayKey); el.remove(); };
  },

  loadDate(d) {
    d = d || new Date();
    const dayNames = ['일','월','화','수','목','금','토'];
    this.selectedDate = d;
    this.today = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${dayNames[d.getDay()]}요일`;
    this.todayKey = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    this.dayOfWeek = d.getDay() === 0 ? 6 : d.getDay() - 1; // 0=Mon..6=Sun
    this.isWeekend = d.getDay() === 0 || d.getDay() === 6;
    this.renderDatePicker();
  },
  renderDatePicker(){
    const d = this.selectedDate;
    const dayNames = ['일','월','화','수','목','금','토'];
    const disp = document.getElementById('date-display');
    if (disp) {
      const isInit = !localStorage.getItem('mc_date_set');
      if (isInit && !this._dateUserSet) {
        disp.textContent = '날짜를 입력해주세요 👆';
      } else {
        disp.innerHTML = `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}. <span class="dow">${dayNames[d.getDay()]}요일</span>`;
      }
    }
  },
  openDatePicker(){
    this.ensureAudio();
    let viewY = this.selectedDate.getFullYear();
    let viewM = this.selectedDate.getMonth();
    let pickD = new Date(this.selectedDate);
    const dayNames = ['일','월','화','수','목','금','토'];
    const render = ()=>{
      const first = new Date(viewY, viewM, 1);
      const startDow = first.getDay();
      const last = new Date(viewY, viewM+1, 0).getDate();
      const prevLast = new Date(viewY, viewM, 0).getDate();
      const cells = [];
      for (let i=startDow-1;i>=0;i--) cells.push({d:prevLast-i, other:true, m:viewM-1});
      for (let i=1;i<=last;i++) cells.push({d:i, other:false, m:viewM});
      while (cells.length<42) cells.push({d:cells.length-startDow-last+1, other:true, m:viewM+1});
      const today = new Date();
      return `<div class="cal-pop">
        <div class="cal-head">
          <button id="cal-prev">‹</button>
          <span>${viewY}년 ${viewM+1}월</span>
          <button id="cal-next">›</button>
        </div>
        <div class="cal-grid">
          ${dayNames.map((n,i)=>`<div class="cal-dow" style="color:${i===0?'var(--acc-coral)':i===6?'var(--acc-sky)':'var(--text-sub)'}">${n}</div>`).join('')}
          ${cells.map((c,i)=>{
            const dt = new Date(viewY, c.m, c.d);
            const dow = i%7;
            const isT = dt.toDateString()===today.toDateString();
            const isS = dt.toDateString()===pickD.toDateString();
            return `<div class="cal-day ${c.other?'other':''} ${isT?'today':''} ${isS?'selected':''} ${dow===0?'sun':''} ${dow===6?'sat':''}" data-y="${dt.getFullYear()}" data-m="${dt.getMonth()}" data-d="${dt.getDate()}">${c.d}</div>`;
          }).join('')}
        </div>
        <div class="popup-actions">
          <button class="btn-cancel" id="cal-today-btn">📍 오늘</button>
          <button class="btn-save" id="cal-save">✅ 입력</button>
        </div>
      </div>`;
    };
    this.openPopup('📅 날짜 선택', render(), {onMount:()=>{
      const body = document.getElementById('popup-body');
      const refresh = ()=>{ body.innerHTML = render(); bind(); };
      const bind = ()=>{
        document.getElementById('cal-prev').onclick = ()=>{ viewM--; if(viewM<0){viewM=11;viewY--;} refresh(); };
        document.getElementById('cal-next').onclick = ()=>{ viewM++; if(viewM>11){viewM=0;viewY++;} refresh(); };
        document.getElementById('cal-today-btn').onclick = ()=>{ const t=new Date(); viewY=t.getFullYear(); viewM=t.getMonth(); pickD=t; refresh(); };
        body.querySelectorAll('.cal-day').forEach(el=>el.onclick=()=>{
          pickD = new Date(+el.dataset.y, +el.dataset.m, +el.dataset.d);
          viewY=pickD.getFullYear(); viewM=pickD.getMonth();
          refresh();
        });
        document.getElementById('cal-save').onclick = ()=>{
          this._dateUserSet = true;
          localStorage.setItem('mc_date_set','1');
          this.loadDate(pickD); this.loadRecord(); this.renderAll();
          this.playSound('save'); this.toast(`${pickD.getFullYear()}.${pickD.getMonth()+1}.${pickD.getDate()} 불러왔어요`,'success');
          this.closePopup();
        };
      };
      bind();
    }});
  },

  // ── 학급별 저장 키 헬퍼 (여러 학급을 동시에 저장·전환) ──
  classPrefix() { return (this.currentClassId || 'default') + '_'; },
  rkey(dateKey) { return 'mc_record_' + this.classPrefix() + (dateKey==null ? this.todayKey : dateKey); },
  tkey(day) { return 'mc_timetable_' + this.classPrefix() + day; },
  dkey() { return 'mc_draft_notes_' + this.classPrefix() + this.todayKey; },

  loadSettings() {
    this.loadClasses();
    this.applyCurrentClass();
  },
  loadClasses() {
    try { this.classes = JSON.parse(localStorage.getItem('mc_classes') || 'null'); }
    catch(e){ this.classes = null; }
    if (!Array.isArray(this.classes)) this.classes = null;
    if (!this.classes || !this.classes.length) this.migrateOrInitClasses();
    let cur = localStorage.getItem('mc_current_class');
    if (!this.classes.find(c=>c.id===cur)) cur = this.classes[0].id;
    this.currentClassId = cur;
    localStorage.setItem('mc_current_class', cur);
  },
  // 기존 단일 설정(mc_settings)·시간표·기록을 첫 학급으로 이전하거나, 없으면 빈 학급 생성
  migrateOrInitClasses() {
    this.classes = [];
    const id = 'c' + Date.now();
    let old = null;
    try { old = JSON.parse(localStorage.getItem('mc_settings') || 'null'); } catch(e){}
    if (old && typeof old === 'object') {
      old.id = id;
      this.classes.push(old);
      // mc_timetable_<0-6> → mc_timetable_<id>_<0-6>
      for (let day=0; day<=6; day++) {
        const v = localStorage.getItem('mc_timetable_'+day);
        if (v!=null) { localStorage.setItem('mc_timetable_'+id+'_'+day, v); localStorage.removeItem('mc_timetable_'+day); }
      }
      // mc_record_/mc_draft_notes_/mc_celebrated_<8자리> → <id> 접두어 추가
      Object.keys(localStorage).forEach(k=>{
        let m;
        if ((m=k.match(/^mc_record_(\d{8})$/)))       { localStorage.setItem('mc_record_'+id+'_'+m[1], localStorage.getItem(k)); localStorage.removeItem(k); }
        else if ((m=k.match(/^mc_draft_notes_(\d{8})$/))) { localStorage.setItem('mc_draft_notes_'+id+'_'+m[1], localStorage.getItem(k)); localStorage.removeItem(k); }
        else if ((m=k.match(/^mc_celebrated_(\d{8})$/)))  { localStorage.setItem('mc_celebrated_'+id+'_'+m[1], localStorage.getItem(k)); localStorage.removeItem(k); }
      });
      localStorage.removeItem('mc_settings');
    } else {
      this.classes.push({ id, schoolName:'', className:'', students:[], neisKey:'', neisAtptCode:'', neisSchoolCode:'', bookUrl:'', bookTitle:'' });
    }
    localStorage.setItem('mc_classes', JSON.stringify(this.classes));
    localStorage.setItem('mc_current_class', id);
  },
  applyCurrentClass() {
    const cls = this.classes.find(c=>c.id===this.currentClassId) || this.classes[0];
    this.settings = cls;
    this.currentClassId = cls.id;
    // 영상 재생 기본 영상 (설정에서 변경 가능)
    if (!this.settings.bookUrl) {
      this.settings.bookUrl = 'https://www.youtube.com/watch?v=VAoR8bL04qA&list=RDVAoR8bL04qA&start_radio=1';
      this.settings.bookTitle = this.settings.bookTitle || '아침 음악';
    }
    document.getElementById('school-info').textContent =
      `${this.settings.schoolName||'학교명'} · ${this.settings.className||'학급명'}`;
  },
  // 현재 설정(this.settings)을 학급 배열에 반영해 저장
  persistClasses() {
    const idx = this.classes.findIndex(c=>c.id===this.currentClassId);
    if (idx>=0) this.classes[idx] = this.settings;
    else this.classes.push(this.settings);
    localStorage.setItem('mc_classes', JSON.stringify(this.classes));
  },
  // 설정 편집 중 다른 학급으로 전환 (편집 중이던 초안은 해당 학급에 커밋)
  commitDraftToClass() {
    if (!this.settingsDraft) return;
    if (this.settingsTab==='timetable') {
      const cur = [...document.querySelectorAll('.tt-pinp')].map(i=>i.value);
      if (cur.length) localStorage.setItem(this.tkey(this.settingsDay), JSON.stringify({periods:cur}));
    }
    const idx = this.classes.findIndex(c=>c.id===this.currentClassId);
    if (idx>=0) { this.settingsDraft.id = this.currentClassId; this.classes[idx] = this.settingsDraft; }
    localStorage.setItem('mc_classes', JSON.stringify(this.classes));
  },
  switchClass(id) {
    if (id===this.currentClassId) return;
    this.commitDraftToClass();
    this.currentClassId = id;
    localStorage.setItem('mc_current_class', id);
    this.applyCurrentClass();
    this.settingsDraft = JSON.parse(JSON.stringify(this.settings));
    this.loadRecord();
    this.renderAll();
    this.renderSettingsTabs();
    this.toast(`'${this.settings.className||'새 학급'}' 학급으로 전환`,'success');
  },
  addClass() {
    this.commitDraftToClass();
    // 직전 학급(드래프트 편집 반영본)을 기준으로 학교 정보를 그대로 이어받음
    const src = this.classes.find(c=>c.id===this.currentClassId) || this.settings || {};
    const id = 'c' + Date.now();
    // 같은 학교의 다른 반이 흔하므로 학교명·급식코드·영상은 이어받고 학급명·학생만 비움
    const cls = {
      id, schoolName: src.schoolName||'', className:'', students:[],
      neisKey: src.neisKey||'', neisAtptCode: src.neisAtptCode||'', neisSchoolCode: src.neisSchoolCode||'',
      bookUrl: src.bookUrl||'', bookTitle: src.bookTitle||''
    };
    this.classes.push(cls);
    localStorage.setItem('mc_classes', JSON.stringify(this.classes));
    this.currentClassId = id;
    localStorage.setItem('mc_current_class', id);
    this.applyCurrentClass();
    this.settingsDraft = JSON.parse(JSON.stringify(this.settings));
    this.settingsTab = 'info';
    this.loadRecord();
    this.renderAll();
    this.renderSettingsTabs();
    this.toast('새 학급을 추가했어요. 학급명과 학생을 입력하세요','success');
  },
  deleteClass(id) {
    if (this.classes.length<=1) { this.toast('마지막 학급은 삭제할 수 없어요','error'); return; }
    const cls = this.classes.find(c=>c.id===id); if (!cls) return;
    if (!confirm(`'${cls.className||'이 학급'}'의 학생·시간표·모든 출결 기록을 삭제할까요? 되돌릴 수 없어요.`)) return;
    Object.keys(localStorage).forEach(k=>{
      if (k.startsWith('mc_record_'+id+'_') || k.startsWith('mc_timetable_'+id+'_') ||
          k.startsWith('mc_draft_notes_'+id+'_') || k.startsWith('mc_celebrated_'+id+'_')) localStorage.removeItem(k);
    });
    this.classes = this.classes.filter(c=>c.id!==id);
    localStorage.setItem('mc_classes', JSON.stringify(this.classes));
    if (this.currentClassId===id) { this.currentClassId = this.classes[0].id; localStorage.setItem('mc_current_class', this.currentClassId); }
    this.applyCurrentClass();
    this.settingsDraft = JSON.parse(JSON.stringify(this.settings));
    this.loadRecord();
    this.renderAll();
    this.renderSettingsTabs();
    this.toast('학급을 삭제했어요','success');
  },
  // 설정 모달 없이 학급만 선택 (첫 접속 학급 선택 모달용)
  selectClass(id) {
    if (id && id !== this.currentClassId) {
      this.currentClassId = id;
      localStorage.setItem('mc_current_class', id);
      this.applyCurrentClass();
      this.loadRecord();
      this.renderAll();
    }
    this.closePopup();
    // 학생이 없는 학급이면 안내
    if (!this.settings || !this.settings.students?.length) this.openWelcome();
  },

      <button class="class-pick-btn ${c.id===this.currentClassId?'current':''}" data-cid="${c.id}">
        <span class="cp-name">${esc(c.className||'이름 없는 학급')}</span>
        <span class="cp-school">${esc(c.schoolName||'학교 미설정')}</span>

    this.openPopup('🏫 학급 선택', `

      }});

  loadRecord() {
    try {
      const saved = JSON.parse(localStorage.getItem(this.rkey()) || 'null');
      // 예전/부분 기록에 없는 필드(emotions·attendance·helpers 등)를 기본값으로 채워 렌더 오류 방지
      this.record = saved ? { ...this.emptyRecord(), ...saved } : this.emptyRecord();
    } catch(e){ this.record = this.emptyRecord(); }
  },
  emptyRecord() {
    return {
      date: this.today, weather: null, dust: null,
      emotions: {}, attendance: {}, timetableArranged: null, timetableCorrect: false, timetableNotes: {},
      helpers: [], helperPickedAt: null,
      notes: '', mealText: '', mealLoadedAt: null,
      bookUrl: this.settings?.bookUrl, bookTitle: this.settings?.bookTitle
    };
  },
  saveRecord(silent) {
    this.record.savedAt = new Date().toISOString();
    try {
      localStorage.setItem(this.rkey(), JSON.stringify(this.record));
      if (!silent) this.toast('💾 저장 완료!','success');
    } catch(e){
      this.cleanOldRecords();
      try { localStorage.setItem(this.rkey(), JSON.stringify(this.record)); }
      catch(e2){ this.toast('저장 공간이 부족해요. 백업을 받아주세요.','error'); }
    }
  },
  cleanOldRecords() {
    const cutoff = Date.now() - 60*86400000;
    Object.keys(localStorage).filter(k=>k.startsWith('mc_record_')).forEach(k=>{
      const m = k.match(/_(\d{8})$/);
      if (m) {
        const d = new Date(`${m[1].slice(0,4)}-${m[1].slice(4,6)}-${m[1].slice(6,8)}`);
        if (d.getTime() < cutoff) localStorage.removeItem(k);
      }
    });
  },

    // 첫 사용자 제스처 시 TTS/오디오 잠금 해제 (브라우저 정책)
    const unlock = ()=>{ this.unlockTTS(); this.ensureAudio(); };

  // ── Audio ──
  ensureAudio() {
    if (!this.audio) {
      try { this.audio = new (window.AudioContext||window.webkitAudioContext)(); }
      catch(e){ return null; }
    }
    if (this.audio.state === 'suspended') this.audio.resume();
    return this.audio;
  },
  playSound(type) {
    if (this.muted) return;
    const ctx = this.ensureAudio(); if (!ctx) return;
    const seq = {
      select:[{f:450,t:0,d:.15}],
      emotion:[{f:523,t:0,d:.15},{f:659,t:.15,d:.15}],
      check:[{f:600,t:0,d:.1}],
      correct:[{f:659,t:0,d:.1},{f:784,t:.1,d:.15}],
      wrong:[{f:220,t:0,d:.15}],
      save:[{f:523,t:0,d:.12},{f:659,t:.12,d:.12},{f:784,t:.24,d:.18}],
      complete:[{f:523,t:0,d:.12},{f:659,t:.13,d:.12},{f:784,t:.26,d:.12},{f:1047,t:.39,d:.3}]
    }[type] || [{f:450,t:0,d:.15}];
    seq.forEach(({f,t,d})=>{
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = f; osc.type = 'sine';
      g.gain.setValueAtTime(.3, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+t+d);
      osc.start(ctx.currentTime+t); osc.stop(ctx.currentTime+t+d+.05);
    });
  },

  // ── TTS (Web Speech API) ──
  ttsUnlocked: false,
  unlockTTS() {
    if (this.ttsUnlocked || !('speechSynthesis' in window)) return;
    try {
      this.ttsUnlocked = true;
      this.ttsVoices = window.speechSynthesis.getVoices();
      console.log('[TTS] unlocked. voices:', this.ttsVoices.map(v=>v.lang));
    } catch(e){ console.warn('[TTS] unlock failed', e); }
  },
  speak(text, opts={}) {
    text = String(text || '').trim();
    if (this.muted || !text) return;
    if (!('speechSynthesis' in window)) { console.warn('[TTS] not supported'); return; }
    const now = Date.now();
    if (text === this.ttsLastText && now - this.ttsLastAt < 350) return;
    this.ttsLastText = text;
    this.ttsLastAt = now;
    this.unlockTTS();
    const doSpeak = (tryCount=0)=>{
      try {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ko-KR';
        u.rate = opts.rate ?? 0.95;
        u.pitch = opts.pitch ?? 1.05;
        u.volume = opts.volume ?? 1.0;
        const voices = this.ttsVoices?.length ? this.ttsVoices : window.speechSynthesis.getVoices();
        this.ttsVoices = voices;
        const ko = voices.find(v=>v.lang==='ko-KR') || voices.find(v=>v.lang?.startsWith('ko')) || voices.find(v=>/Korean|한국/i.test(v.name));
        if (ko) u.voice = ko;
        u.onerror = (e)=>{
          // 새 안내를 읽기 위해 이전 발화를 멈출 때 생기는 정상 이벤트는 오류로 표시하지 않음
          if (['canceled','interrupted'].includes(e.error) && tryCount < 1) {
            setTimeout(()=>doSpeak(tryCount+1), 180);
            return;
          }
          if (!['canceled','interrupted'].includes(e.error)) console.warn('[TTS] error', e.error||e);
        };
        window.speechSynthesis.speak(u);
      } catch(e){ console.warn('[TTS] speak failed', e); }
    };
    try {
      if (window.speechSynthesis.speaking || window.speechSynthesis.pending) window.speechSynthesis.cancel();
    } catch(e){}
    // Chrome cancel→speak 무시 버그 회피: 약간의 지연
    setTimeout(()=>doSpeak(0), 180);
  },

  // ── Popup helpers ──
  openPopup(title, bodyHTML, opts={}) {
    this.prevFocus = document.activeElement;
    document.getElementById('popup-title').textContent = title;
    document.getElementById('popup-body').innerHTML = bodyHTML;
    const card = document.getElementById('popup-card');
    card.classList.toggle('large', !!opts.large);
    document.getElementById('popup-overlay').classList.add('active');
    document.getElementById('popup-overlay').classList.remove('closing');
    document.body.style.overflow = 'hidden';
    if (opts.onMount) opts.onMount();
    setTimeout(()=>{
      const f = document.querySelector('#popup-body button, #popup-body input, #popup-body textarea');
      f?.focus();
    },50);
    this.currentOnClose = opts.onClose || null;
  },
  closePopup() {
    const ov = document.getElementById('popup-overlay');
    ov.classList.add('closing');
    setTimeout(()=>{
      ov.classList.remove('active','closing');
      document.body.style.overflow = '';
      this.prevFocus?.focus();
      if (this.currentOnClose) { this.currentOnClose(); this.currentOnClose=null; }
    },180);
  },
  toast(msg, type='') {
    const el = document.createElement('div');
    el.className = 'toast '+type; el.textContent = msg;
    document.getElementById('toasts').appendChild(el);
    setTimeout(()=>el.remove(),2700);
    document.getElementById('aria-live').textContent = msg;
  },

  openWeather() {

      <div class="choice-divider">— 또는 직접 선택해요 —</div>

    ).join('')}</div>`;
    this.openPopup('오늘 날씨는 어때요?', html, {onMount:()=>{
      const auto = document.getElementById('wx-auto');
      if (auto) auto.onclick = ()=> this.autoWeather();
      document.querySelectorAll('#popup-body .choice-item').forEach(b=>b.onclick=()=>{

  // ── 위치 기반 자동 조회 (Open-Meteo, API 키 불필요) ──
  getPosition() {
    return new Promise((res, rej)=>{
      if (!navigator.geolocation) { rej(new Error('no_geo')); return; }
      navigator.geolocation.getCurrentPosition(res, rej, {timeout:8000, maximumAge:600000, enableHighAccuracy:false});
    });
  },
  weatherFromCode(code) { // WMO weather code → WEATHER 항목
    if (code==null) return null;
    let label;
    if (code===0) label='맑음';
    else if (code===1||code===2) label='구름조금';
    else if (code===3||code===45||code===48) label='흐림';
    else if ((code>=71&&code<=77)||code===85||code===86) label='눈';
    else if (code>=95) label='천둥번개';
    else if ((code>=51&&code<=67)||(code>=80&&code<=82)) label='비';
    else label='흐림';
    return WEATHER.find(w=>w.label===label) || null;
  },
  dustFromPm10(v) { // PM10(㎍/㎥) → DUST 등급 (한국 기준)
    if (v==null || isNaN(v)) return null;
    const level = v<=30?0 : v<=80?1 : v<=150?2 : 3;
    return DUST.find(d=>d.level===level) || null;
  },
  async autoWeather() {
    const btn = document.getElementById('wx-auto');
    this.ensureAudio();
    if (btn){ btn.disabled=true; btn.textContent='📡 위치 확인 중...'; }
    try {
      const pos = await this.getPosition();
      const {latitude:lat, longitude:lon} = pos.coords;
      if (btn) btn.textContent='☁️ 날씨 가져오는 중...';
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=weather_code`);
      const data = await r.json();
      const w = this.weatherFromCode(data?.current?.weather_code);
      if (!w) throw new Error('no_map');
      this.record.weather = w; this.playSound('select');
      this.toast(`날씨 자동: ${w.label} ${w.emoji}`,'success');
      this.speak(`오늘 날씨는 ${w.label} 입니다.`);
      this.closePopup(); this.renderWeather(); this.checkComplete(); this.autoSaveDraft();
    } catch(e){
      if (btn){ btn.disabled=false; btn.textContent='📍 위치로 자동 채우기'; }
      this.toast(e.message==='no_geo'?'이 기기는 위치를 지원하지 않아요':'자동 조회 실패 — 직접 선택해 주세요','error');
    }
  },

    const btn = document.getElementById('dust-auto');

  // ── Timetable ──
  todayPeriods() {
    if (this.isWeekend) return [];
    try {
      const tt = JSON.parse(localStorage.getItem(this.tkey(this.dayOfWeek))||'null');
      const arr = (tt?.periods || []).map(s=>(s||'').trim());
      // 뒤쪽 빈 칸 제거 — 교과를 넣은 시간만큼만
      while (arr.length && !arr[arr.length-1]) arr.pop();
      return arr;
    } catch(e){ return []; }
  },

    const c = document.getElementById('card-timetable');
    const ttHead = `<div class="v3-title"><span class="v3-ico" style="background:#e0e7ff;color:#4f46e5"><i class="ph-fill ph-calendar-check"></i></span>오늘의 시간표`;

        <div style="text-align:center;color:var(--text-sub);font-size:18px;font-weight:700">터치해서 시간표를 맞춰봐요 👆</div>`;
    }
  },
  openTimetable() {
    this.ensureAudio();
    let periods = this.todayPeriods();
    // 기본 7교시 자유 배치
    periods = (periods || []).slice(0, MAX_TIMETABLE_PERIODS);
    while (periods.length < MAX_TIMETABLE_PERIODS) periods.push('');
    // answer = teacher-set subjects; may be all empty; input slots always allow 1~7교시
    const answer = periods.map(p=>p||'');
    const hasAnswer = answer.some(a=>a);
    let slots = Array.isArray(this.record.timetableArranged)
      ? this.record.timetableArranged.slice(0, MAX_TIMETABLE_PERIODS)
      : answer.map(()=>'');
    while (slots.length < MAX_TIMETABLE_PERIODS) slots.push('');

    const buildBank = ()=>{
      const custom = getCustomSubjects();
      return [...DEFAULT_SUBJECTS, ...custom];
    };

    const renderBody = ()=>{
      const bank = buildBank();
      const allFilled = slots.some(s=>s); // 한 칸이라도 입력되면 완료 가능
      const allCorrect = hasAnswer && slots.every((s,i)=>s===answer[i] && s);
      return `<div class="tt-popup">
        <div class="tt-slots">
          <div class="tt-section-title">교시별 시간표 ${hasAnswer?'':'<span style="font-weight:500;color:#aaa">(자유 배치)</span>'}</div>
          ${slots.map((cur,i)=>{
            const isC = hasAnswer && cur && cur===answer[i];
            return `<div class="tt-slot ${isC?'correct':''}" data-slot="${i}">
              <span class="pnum">${i+1}교시</span>
              <div class="drop-zone" data-slot="${i}">
                ${cur?`<div class="subject-chip in-slot" draggable="true" data-from="slot" data-slot="${i}" data-name="${esc(cur)}"><span class="ico">${subjectIcon(cur)}</span>${esc(cur)}</div>`:'<span style="color:var(--text-sub);font-size:16px">여기에 끌어다 놓으세요</span>'}
              </div>
              ${cur?`<button class="slot-clear" data-clear="${i}" title="비우기">✕</button>`:''}
              ${isC?'<span class="check">✓</span>':''}
            </div>`;
          }).join('')}
        </div>
        <div class="tt-bank">
          <div class="tt-section-title">교과 보관함 <span style="font-weight:500;color:var(--text-sub);font-size:15px">끌어서 옮겨요</span></div>
          <div class="tt-bank-grid" data-bank="1">
            ${bank.map(s=>`<div class="subject-chip" draggable="true" data-from="bank" data-name="${esc(s)}"><span class="ico">${subjectIcon(s)}</span>${esc(s)}</div>`).join('')}
            <button class="subject-chip add-chip" id="tt-add-subject" type="button"><span class="ico">➕</span>직접입력</button>
          </div>
        </div>
      </div>
      <div class="tt-popup-actions">
        ${hasAnswer?`<button class="btn-hint" id="tt-hint">💡 정답 보기</button>`:''}
        <button class="btn-cancel" id="tt-reset">↺ 초기화</button>
        <button class="btn-done" id="tt-done" ${allFilled?'':'disabled'}>${allCorrect?'🎉 완벽해요!':(allFilled?'✅ 완료':'1칸 이상 채워주세요')}</button>
      </div>`;
    };

    this.openPopup('오늘의 시간표를 맞춰봐요! 📅', renderBody(), {large:true, onMount:()=>{
      const body = document.getElementById('popup-body');
      const refresh = ()=>{ body.innerHTML = renderBody(); bind(); };

      const placeAt = (name, target)=>{
        slots[target] = name;
        if (hasAnswer && slots[target] === answer[target]) this.playSound('correct');
        else if (hasAnswer) { this.playSound('wrong'); const el = body.querySelector(`.tt-slot[data-slot="${target}"]`); if(el){el.classList.add('shake'); setTimeout(()=>el?.classList.remove('shake'),300);} }
        else this.playSound('select');
        this.speak(`${target+1}교시 ${name}`);
      };

      const moveTo = (name, fromSlot, toSlot) => {
        if (toSlot === 'bank') {
          // dropping a slot chip back to bank = clear that slot
          if (fromSlot != null) slots[fromSlot] = '';
        } else {
          const target = +toSlot;
          if (fromSlot != null) {
            // moving slot→slot: swap
            const tmp = slots[target];
            slots[target] = name;
            slots[fromSlot] = tmp;
            if (hasAnswer && slots[target]===answer[target]) this.playSound('correct');
            else if (hasAnswer) this.playSound('wrong');
            else this.playSound('select');
          } else {
            // bank→slot: place (overwrites if occupied; reusable)
            placeAt(name, target);
          }
        }
        refresh();
      };

      const bind = ()=>{
        body.querySelectorAll('.subject-chip[draggable="true"]').forEach(chip=>{
          chip.addEventListener('dragstart', e=>{
            chip.classList.add('dragging');
            e.dataTransfer.setData('text/plain', JSON.stringify({
              name: chip.dataset.name, from: chip.dataset.from, slot: chip.dataset.slot
            }));
          });
          chip.addEventListener('dragend', ()=>chip.classList.remove('dragging'));

          // Pointer fallback for touch
          let ghost=null, startX=0, startY=0, dragging=false;
          chip.addEventListener('pointerdown', e=>{
            if (e.pointerType === 'mouse') return;
            startX=e.clientX; startY=e.clientY; dragging=false;
            const onMove = ev=>{
              if (!dragging && (Math.abs(ev.clientX-startX)>5 || Math.abs(ev.clientY-startY)>5)) {
                dragging=true;
                ghost = chip.cloneNode(true);
                ghost.classList.add('ghost');
                ghost.style.width = chip.offsetWidth+'px';
                document.body.appendChild(ghost);
                chip.classList.add('dragging');
              }
              if (dragging && ghost) {
                ghost.style.left = (ev.clientX - 60)+'px';
                ghost.style.top = (ev.clientY - 28)+'px';
                body.querySelectorAll('.tt-slot').forEach(s=>s.classList.remove('drag-over'));
                const el = document.elementFromPoint(ev.clientX, ev.clientY);
                const slot = el?.closest('.tt-slot');
                if (slot) slot.classList.add('drag-over');
              }
            };
            const onUp = ev=>{
              window.removeEventListener('pointermove', onMove);
              window.removeEventListener('pointerup', onUp);
              if (!dragging) { return; }
              ghost?.remove(); ghost=null;
              chip.classList.remove('dragging');
              const el = document.elementFromPoint(ev.clientX, ev.clientY);
              const slot = el?.closest('.tt-slot');
              const bankZ = el?.closest('[data-bank]');
              const fromSlot = chip.dataset.from==='slot' ? +chip.dataset.slot : null;
              if (slot) moveTo(chip.dataset.name, fromSlot, slot.dataset.slot);
              else if (bankZ && chip.dataset.from==='slot') moveTo(chip.dataset.name, fromSlot, 'bank');
            };
            window.addEventListener('pointermove', onMove);
            window.addEventListener('pointerup', onUp);
          });
        });

        body.querySelectorAll('.tt-slot').forEach(slot=>{
          slot.addEventListener('dragover', e=>{ e.preventDefault(); slot.classList.add('drag-over'); });
          slot.addEventListener('dragleave', ()=>slot.classList.remove('drag-over'));
          slot.addEventListener('drop', e=>{
            e.preventDefault(); slot.classList.remove('drag-over');
            try {
              const d = JSON.parse(e.dataTransfer.getData('text/plain'));
              const fromSlot = d.from==='slot' ? +d.slot : null;
              moveTo(d.name, fromSlot, slot.dataset.slot);
            } catch(e){}
          });
        });
        const bankEl = body.querySelector('[data-bank]');
        if (bankEl) {
          bankEl.addEventListener('dragover', e=>e.preventDefault());
          bankEl.addEventListener('drop', e=>{
            e.preventDefault();
            try {
              const d = JSON.parse(e.dataTransfer.getData('text/plain'));
              if (d.from === 'slot') moveTo(d.name, +d.slot, 'bank');
            } catch(e){}
          });
        }

        body.querySelectorAll('[data-clear]').forEach(b=>{
          b.onclick = ()=>{ slots[+b.dataset.clear] = ''; this.playSound('select'); refresh(); };
        });

        const addBtn = document.getElementById('tt-add-subject');
        if (addBtn) addBtn.onclick = ()=>{
          const name = prompt('새 교과명을 입력하세요 (예: 한국사)')?.trim();
          if (!name) return;
          if (name.length > 10) { this.toast('10자 이내로 입력해 주세요','error'); return; }
          addCustomSubject(name);
          this.playSound('save');
          this.toast(`"${name}" 추가됨 ✨`,'success');
          refresh();
        };

        const hintBtn = document.getElementById('tt-hint');
        if (hintBtn) hintBtn.onclick = ()=>{
          slots = answer.slice(); this.playSound('complete'); refresh();
        };
        document.getElementById('tt-reset').onclick = ()=>{
          slots = Array(MAX_TIMETABLE_PERIODS).fill(''); this.playSound('select'); refresh();
        };
        document.getElementById('tt-done').onclick = ()=>{
          // 입력한 만큼만 저장 (뒤쪽 빈 칸 trim)
          const trimmed = slots.slice();
          while (trimmed.length && !trimmed[trimmed.length-1]) trimmed.pop();
          this.record.timetableArranged = trimmed;
          this.record.timetableCorrect = hasAnswer && answer.every((a,i)=>!a || slots[i]===a);

          const said = trimmed.map((s,i)=>s?`${i+1}교시 ${s}`:'').filter(x=>x).join(', ');

          this.closePopup(); this.renderTimetable(); this.autoSaveDraft();
        };
      };
      bind();
