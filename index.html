  async loadMeal(force) {
    this.ensureAudio(); this.playSound('select');
    const c = document.getElementById('card-meal');
    c.className='card empty';
    c.innerHTML = `<div class="card-title">🍱 오늘의 급식</div>
      <div class="meal-loading"><div class="spinner">🍳</div><div class="text">급식 정보를 가져오는 중...</div></div>`;
    const spinner = c.querySelector('.spinner');
    const emojis = ['🍳','🍚','🍲','🥗','🍱'];
    let ei = 0;
    const interval = setInterval(()=>{ if(spinner) spinner.textContent = emojis[++ei % emojis.length]; }, 400);

    const s = this.settings;
    if (!s?.neisAtptCode || !s?.neisSchoolCode) {
      clearInterval(interval);
      c.innerHTML = `<div class="card-title">🍱 오늘의 급식</div>
        <div class="card-hint">⚙️ 설정에서 학교를 검색해 등록해 주세요</div>
        <div class="meal-actions"><button id="meal-manual">✏️ 직접 입력</button></div>`;
      document.getElementById('meal-manual').onclick = ()=> this.openManualMeal();
      return;
    }

    try {
      const data = await this.neisRequest('mealServiceDietInfo', {pIndex:1, pSize:1, ATPT_OFCDC_SC_CODE:s.neisAtptCode, SD_SCHUL_CODE:s.neisSchoolCode, MLSV_YMD:this.todayKey});
      clearInterval(interval);
      if (data?.mealServiceDietInfo) {
        const row = data.mealServiceDietInfo[1].row[0];
        let menu = row.DDISH_NM || '';
        // remove allergy numbers
        const items = menu.split('<br/>').map(x=>
          x.replace(/\s*\(\d+(\.\d+)*\)/g,'').replace(/\s*\d+(\.\d+)*\.?\s*$/g,'').trim()
        ).filter(x=>x);
        this.record.mealText = items.join('\n');
        this.record.mealLoadedAt = new Date().toISOString();
        this.playSound('complete');
        this.speak(`오늘 급식 메뉴는, ${items.join(', ')} 입니다.`);
        this.renderMeal();
        this.autoSaveDraft();
      } else if (data?.RESULT?.CODE === 'INFO-200') {
        clearInterval(interval);
        c.innerHTML = `<div class="card-title">🍱 오늘의 급식</div>
          <div class="card-hint">🏖️ 오늘은 급식이 없는 날이에요</div>
          <div class="meal-actions"><button id="meal-manual">✏️ 직접 입력</button></div>`;
        document.getElementById('meal-manual').onclick = ()=> this.openManualMeal();
      } else { throw new Error('no_data'); }
    } catch(e) {
      clearInterval(interval);
      c.innerHTML = `<div class="card-title">🍱 오늘의 급식</div>
        <div class="card-hint">🍽️ 급식을 가져올 수 없어요</div>
        <div class="meal-actions">
          <button id="meal-retry">🔄 다시 불러오기</button>
          <button id="meal-manual">✏️ 직접 입력</button>
        </div>`;
      document.getElementById('meal-retry').onclick = ()=> this.loadMeal();
      document.getElementById('meal-manual').onclick = ()=> this.openManualMeal();
    }
  },
  async fetchWithFallback(url) {
    const strategies = [
      ()=> fetch(url),
      ()=> fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`),
      ()=> fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`)
    ];
    for (const tryFn of strategies) {
      try {
        const r = await tryFn();
        if (r.ok) return await r.json();
      } catch(e){}
    }
    throw new Error('all_failed');
  },
  // NEIS 요청: 배포 환경에선 서버리스 프록시(/api/neis, 키 서버 보관), 로컬/개인 키가 있으면 직접 호출 폴백
  async neisRequest(endpoint, params) {
    const qs = new URLSearchParams({ ...params, Type: 'json' }).toString();
    try {
      const r = await fetch(`/api/neis?endpoint=${encodeURIComponent(endpoint)}&${qs}`);
      if (r.ok) {
        const data = await r.json();
        if (data && !data.error) return data;
      }
    } catch(e){}
    const key = neisKey();
    if (key) return await this.fetchWithFallback(`https://open.neis.go.kr/hub/${endpoint}?KEY=${encodeURIComponent(key)}&${qs}`);
    throw new Error('neis_unavailable');
  },

  renderHelper() {
    const c = document.getElementById('card-helper');
    if (!c) return;
    const students = this.settings?.students || [];
    const hChip = `<span class="v3-ico" style="background:#ede9fe;color:#7c3aed"><i class="ph-duotone ph-dice-five"></i></span>`;

      c.onclick = null;
      return;
    }
    const att = this.record.attendance || {};
    const picked = (this.record.helpers || []).filter(n => n && att[n] !== 'late' && att[n] !== 'absent');
    if (picked.length) {
      c.className='card touchable filled'; c.style.cursor='pointer';
      c.innerHTML = `<div class="v3-title">${hChip}오늘의 도우미<span class="v3-check"><i class="ph-bold ph-check"></i></span></div>
        <div class="helper-winners">${picked.map(n=>`<div class="helper-winner"><span class="hw-em"><i class="ph-fill ph-star"></i></span><span class="hw-nm">${esc(n)}</span></div>`).join('')}</div>`;
    } else {
      c.className='card touchable empty'; c.style.cursor='pointer';
      c.innerHTML = `<div class="v3-title">${hChip}오늘의 도우미</div><div class="card-hint" style="font-size:16px">🎯 터치해서 오늘의 도우미를 뽑아요</div>`;
    }
    c.onclick = ()=> this.openHelper();
  },
  openHelper() {
    this.ensureAudio();
    const students = this.settings?.students || [];
    if (!students.length) return;
    const att = this.record.attendance || {};
    let pool = students.filter(n=>att[n]!=='late' && att[n]!=='absent'); // 지각·결석 제외
    if (!pool.length) pool = students.slice();
    let count = Math.min(Math.max((this.record.helpers||[]).length || 1, 1), pool.length);
    let winners = (this.record.helpers||[]).filter(Boolean);
    let spinning = false;
    const maxCount = Math.min(pool.length, 6);

    const stageHTML = ()=> winners.length
      ? winners.map(n=>`<div class="helper-winner big"><span class="hw-em">🌟</span><span class="hw-nm">${esc(n)}</span></div>`).join('')
      : '<div class="helper-placeholder">🎲<br>뽑기 버튼을 눌러주세요</div>';
    const render = ()=>`
      <div class="helper-setup">
        <div class="helper-count-label">몇 명 뽑을까요?</div>
        <div class="helper-count">${Array.from({length:maxCount},(_,i)=>i+1).map(n=>
          `<button class="hc-btn ${n===count?'active':''}" data-c="${n}">${n}명</button>`).join('')}</div>
        <div class="helper-pool-note">후보 ${pool.length}명 (지각·결석 제외)</div>
      </div>
      <div class="helper-stage" id="helper-stage">${stageHTML()}</div>
      <div class="popup-actions">
        <button class="btn-cancel" id="helper-close">닫기</button>
        <button class="btn-save" id="helper-roll">🎲 ${winners.length?'다시 뽑기':'뽑기'}</button>
      </div>`;

    this.openPopup('🎲 오늘의 도우미 뽑기', render(), {onMount:()=>{
      const body = document.getElementById('popup-body');
      const refresh = ()=>{ body.innerHTML = render(); bind(); };
      const roll = ()=>{
        if (spinning) return;
        spinning = true;
        const rollBtn = document.getElementById('helper-roll');
        if (rollBtn) rollBtn.disabled = true;
        // 당첨자 미리 결정 (Fisher–Yates)
        const shuffled = pool.slice();
        for (let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }
        const finalWinners = shuffled.slice(0, count);
        const totalTicks = 16 + count*2;
        let ticks = 0;
        const tick = ()=>{
          const stage = document.getElementById('helper-stage');
          if (!stage) { spinning=false; return; } // 팝업이 닫힌 경우 중단
          ticks++;
          const sample = Array.from({length:count}, ()=>pool[Math.floor(Math.random()*pool.length)]);
          stage.innerHTML = sample.map(n=>`<div class="helper-winner big rolling"><span class="hw-em">🎰</span><span class="hw-nm">${esc(n)}</span></div>`).join('');
          this.playSound('check');
          if (ticks < totalTicks) {
            setTimeout(tick, 60 + Math.pow(ticks/totalTicks, 3) * 340); // 점점 느려짐
          } else {
            winners = finalWinners;
            this.record.helpers = winners.slice();
            this.record.helperPickedAt = new Date().toISOString();
            this.playSound('complete');
            this.toast(`오늘의 도우미: ${winners.join(', ')} 🌟`,'success');
            this.speak(`오늘의 도우미는, ${winners.join(', ')} 입니다.`);
            this.autoSaveDraft(); this.renderHelper();
            spinning = false;
            refresh();
          }
        };
        tick();
      };
      const bind = ()=>{
        body.querySelectorAll('.hc-btn').forEach(b=>b.onclick=()=>{ if(spinning) return; count=+b.dataset.c; refresh(); });
        document.getElementById('helper-close').onclick=()=>this.closePopup();
        document.getElementById('helper-roll').onclick=roll;
      };
      bind();
    }});
  },

  saveVideoList(list) {
    try { localStorage.setItem('mc_video_list', JSON.stringify(list.slice(0, 50))); } catch(e){}
  },
  fmtVideoTime(iso) {
    const d = new Date(iso), now = new Date();
    const h = d.getHours(), ap = h < 12 ? '오전' : '오후', h12 = h % 12 || 12;
    const mm = String(d.getMinutes()).padStart(2,'0');
    const t = `${ap} ${h12}시 ${mm}분`;
    return d.toDateString() === now.toDateString() ? t : `${d.getMonth()+1}.${d.getDate()} ${t}`;
  },
  async fetchVideoTitle(url) {
    try {
      const data = await this.fetchWithFallback(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
      return data?.title || '';
    } catch(e){ return ''; }
  },
  recordVideo(url) {
    const id = this.extractVideoId(url);
    if (!id) return;
    let list = this.getVideoList();
    const existing = list.find(v => v.videoId === id);
    list = list.filter(v => v.videoId !== id);
    list.unshift({ url, videoId: id, title: existing?.title || url, playedAt: new Date().toISOString() });
    this.saveVideoList(list);
    // 제목 자동 조회 (없을 때만)
    if (!existing || !existing.title || existing.title === existing.url) {
      this.fetchVideoTitle(url).then(title => {
        if (!title) return;
        const l = this.getVideoList(), it = l.find(v => v.videoId === id);
        if (it) { it.title = title; this.saveVideoList(l); this.refreshVideoMeta(); }
      });
    }
  },
  refreshVideoMeta() {
    const win = document.getElementById('video-window');
    if (!win) return;
    const badge = win.querySelector('.vw-badge');
    if (badge) badge.textContent = this.getVideoList().length;
    if (this.videoState?.view === 'list') this.renderVideoWindow(); // 목록 화면일 때만 갱신(재생 중 iframe 리로드 방지)

  openVideoPlayer() {
    this.ensureAudio(); this.playSound('select');
    const list = this.getVideoList();
    const start = (list[0] && list[0].url) || this.settings?.bookUrl || '';
    // 팝업을 열 때는 미리보기만(자동재생 X). 사용자가 URL 입력/목록 클릭 시 재생.
    this.videoState = { view: 'player', currentUrl: start, autoplay: false };
    if (!document.getElementById('video-window')) {
      const win = document.createElement('div');
      win.id = 'video-window'; win.className = 'video-window';
      win.setAttribute('role','dialog'); win.setAttribute('aria-label','영상 재생');
      document.body.appendChild(win);
    }
    this.renderVideoWindow();
  },
  closeVideoPlayer() {
    document.getElementById('video-window')?.remove();

    const id = this.extractVideoId(url);
    if (!id) { this.toast('유튜브 링크를 확인해 주세요','error'); return; }

    this.videoState.view = 'player';
    this.videoState.autoplay = true; // 사용자 선택 시에만 자동재생

  // ── D-DAY (날짜와 무관하게 항상 표시, 삭제 전까지 유지) ──
  getDdays() {
    try { return JSON.parse(localStorage.getItem('mc_ddays') || '[]'); } catch(e){ return []; }
  },
  saveDdays(list) {
    try { localStorage.setItem('mc_ddays', JSON.stringify(list)); } catch(e){}
  },
  ddayDiff(dateStr) {
    const b = this.selectedDate || new Date();
    const base = new Date(b.getFullYear(), b.getMonth(), b.getDate());
    const [y,m,d] = dateStr.split('-').map(Number);
    const target = new Date(y, m-1, d);
    return Math.round((target - base) / 86400000);
  },
  ddayLabel(diff) {
    if (diff === 0) return 'D-DAY';
    return diff > 0 ? 'D-'+diff : 'D+'+Math.abs(diff);
  },
  ddaySorted() {
    // 다가오는 것 먼저(가까운 미래 → 오늘 → 지난 것)
    return this.getDdays().slice().sort((a,b)=>{
      const da = this.ddayDiff(a.date), db = this.ddayDiff(b.date);
      const ra = da < 0 ? 1 : 0, rb = db < 0 ? 1 : 0;
      if (ra !== rb) return ra - rb;
      return da < 0 ? db - da : da - db;
    });
  },
  fmtDdayDate(dateStr) {
    const [y,m,d] = dateStr.split('-').map(Number);
    return `${y}. ${m}. ${d}.`;
  },
  renderDday() {
    const c = document.getElementById('card-dday');
    if (!c) return;
    const chip = `<span class="v3-ico" style="background:#e0e7ff;color:#4f46e5"><i class="ph-fill ph-flag-banner"></i></span>`;
    const list = this.ddaySorted();
    c.className = 'card touchable ' + (list.length ? 'filled' : 'empty');
    if (!list.length) {
      c.innerHTML = `<div class="v3-title">${chip}D-DAY</div><div class="card-hint" style="font-size:15px">터치해서 기념일·시험 D-DAY를 추가해요 👆</div>`;
    } else {
      c.innerHTML = `<div class="v3-title">${chip}D-DAY</div>
        <div class="dday-list">${list.map(it=>{
          const diff = this.ddayDiff(it.date);
          const cls = diff === 0 ? 'today' : (diff < 0 ? 'past' : '');
          return `<div class="dday-row"><span class="dday-badge ${cls}">${this.ddayLabel(diff)}</span><span class="dday-name">${esc(it.name)}</span><span class="dday-date">${this.fmtDdayDate(it.date)}</span></div>`;
        }).join('')}</div>`;
    }
    c.onclick = ()=> this.openDday();
  },
  openDday() {
    this.ensureAudio(); this.playSound('select');
    const todayStr = (()=>{ const d=this.selectedDate||new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
    const render = ()=>{
      const list = this.ddaySorted();
      return `<div class="dday-add">
          <input type="text" class="name" id="dd-name" placeholder="예) 현장체험학습, 중간고사" maxlength="20">
          <input type="date" id="dd-date" value="${todayStr}">
          <button id="dd-add">➕ 추가</button>
        </div>
        <div class="dday-list dday-list-manage">${list.length ? list.map(it=>{
          const diff = this.ddayDiff(it.date);
          const cls = diff === 0 ? 'today' : (diff < 0 ? 'past' : '');
          return `<div class="dday-row"><span class="dday-badge ${cls}">${this.ddayLabel(diff)}</span><span class="dday-name">${esc(it.name)}</span><span class="dday-date">${this.fmtDdayDate(it.date)}</span><button class="dday-del" data-id="${it.id}" title="삭제" aria-label="삭제">✕</button></div>`;
        }).join('') : '<div class="card-hint" style="padding:24px">아직 등록한 D-DAY가 없어요 📭</div>'}</div>`;
    };
    this.openPopup('🚩 D-DAY 관리', render(), {onMount:()=>{
      const body = document.getElementById('popup-body');
      const refresh = ()=>{ body.innerHTML = render(); bind(); };
      const bind = ()=>{
        const add = ()=>{
          const name = document.getElementById('dd-name').value.trim();
          const date = document.getElementById('dd-date').value;
          if (!name) { this.toast('이름을 입력해 주세요','error'); return; }
          if (!date) { this.toast('날짜를 선택해 주세요','error'); return; }
          const list = this.getDdays();
          list.push({ id: 'd'+Date.now(), name, date });
          this.saveDdays(list);
          this.playSound('save'); this.toast('D-DAY 추가!','success');
          this.renderDday(); refresh();
          const ni = document.getElementById('dd-name'); if (ni) ni.focus();
        };
        document.getElementById('dd-add').onclick = add;
        document.getElementById('dd-name').addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); add(); } });
        body.querySelectorAll('.dday-del').forEach(b=>b.onclick=()=>{
          this.saveDdays(this.getDdays().filter(x=>x.id!==b.dataset.id));
          this.playSound('select'); this.renderDday(); refresh();
        });
      };
      bind();
    }});
  },

  // ── Progress / Complete ──
  updateProgress() {
    const att = this.record.attendance||{};
    const students = this.settings?.students||[];
    const arr = this.record.timetableArranged;
    const tasks = [
      !!this._dateUserSet || !!localStorage.getItem('mc_date_set'),
      !!this.record.weather,
      !!this.record.dust,
      students.length>0 && students.every(n=>att[n]),
      Array.isArray(arr) && arr.some(s=>s),
      students.length>0 && students.every(n=>this.record.emotions[n]),
      !!this.record.mealText
    ];
    const done = tasks.filter(Boolean).length;
    const pct = (done/tasks.length)*100;
    document.getElementById('progress-bar').style.width = pct+'%';
    const st = document.getElementById('status-text');
    if (pct>=100) {
      st.textContent = '🎉 오늘의 아침 준비 완료! 모두 화이팅!'; st.classList.add('done');
      this.celebrate(); // 하루 1회 가드는 celebrate() 내부에서 처리
    }
    else { st.textContent = `아침 준비 ${done}/${tasks.length}`; st.classList.remove('done'); }
  },
  checkComplete() {
    this.updateProgress();
    const tasksAllDone = (()=>{
      const att = this.record.attendance||{};
      const students = this.settings?.students||[];
      const arr = this.record.timetableArranged;
      return (this._dateUserSet||localStorage.getItem('mc_date_set'))
        && this.record.weather && this.record.dust
        && students.length>0 && students.every(n=>att[n])
        && Array.isArray(arr) && arr.some(s=>s)
        && students.every(n=>this.record.emotions[n])
        && this.record.mealText;
    })();
    if (tasksAllDone && !this.celebratedToday) {
      this.celebratedToday = true;
      this.celebrate();
      this.saveRecord(true);
      this.toast('자동 저장됐어요 ✅','success');
    }
  },
  // 완료 축하 연출 (통합본): 오버레이 메시지 + 딩동댕동 차임 + 폭죽 + 음성
  celebrate() {
    // 하루 1회만 — updateProgress·checkComplete 양쪽에서 호출돼도 중복 방지
    const flagKey = 'mc_celebrated_'+this.classPrefix()+this.todayKey;
    if (localStorage.getItem(flagKey)) return;
    localStorage.setItem(flagKey, '1');
    this.celebratedToday = true;
    const ov = document.getElementById('celebrate');
    if (ov) { ov.classList.add('active'); setTimeout(()=>ov.classList.remove('active'), 2200); }

    // 딩동댕동 차임 (E5·G5·B5·E6) — 음소거 존중, 공용 AudioContext 재사용
    if (!this.muted) {
      const ctx = this.ensureAudio();
      if (ctx) {
        [{f:659.25,t:0},{f:783.99,t:.25},{f:987.77,t:.5},{f:1318.51,t:.75}].forEach(n=>{
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.type='sine'; o.frequency.value=n.f;
          g.gain.setValueAtTime(0, ctx.currentTime+n.t);
          g.gain.linearRampToValueAtTime(.32, ctx.currentTime+n.t+.02);
          g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+n.t+.5);
          o.connect(g); g.connect(ctx.destination);
          o.start(ctx.currentTime+n.t); o.stop(ctx.currentTime+n.t+.55);
        });
      }
    }

    // 음성 축하 — speak() 내부에서 음소거 처리
    this.speak('오늘 하루도 파이팅이에요! 좋은 하루 보내세요!', {rate:1.0, pitch:1.1});

    // 폭죽 (모션 최소화 설정 시 생략)
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    try {
      const colors = ['#ff3b30','#ff9500','#ffcc00','#34c759','#5ac8fa','#007aff','#af52de','#ff2d92'];
      const container = document.createElement('div');
      container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:99999;overflow:hidden';
      document.body.appendChild(container);
      const launch = (originX, originY) => {
        for (let i=0;i<60;i++){
          const p = document.createElement('div');
          const angle = Math.random()*Math.PI*2;
          const dist = 120 + Math.random()*220;
          const dx = Math.cos(angle)*dist, dy = Math.sin(angle)*dist;
          const size = 6 + Math.random()*8;
          p.style.cssText = `position:absolute;left:${originX}px;top:${originY}px;width:${size}px;height:${size}px;background:${colors[i%colors.length]};border-radius:${Math.random()<.5?'50%':'2px'};transform:translate(-50%,-50%);transition:transform 1.4s cubic-bezier(.2,.7,.3,1),opacity 1.4s ease-out;opacity:1`;
          container.appendChild(p);
          requestAnimationFrame(()=>{
            p.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy+200}px)) rotate(${Math.random()*720}deg)`;
            p.style.opacity = '0';
          });
        }
      };
      const W = window.innerWidth, H = window.innerHeight;
      launch(W*0.25, H*0.4);
      setTimeout(()=>launch(W*0.75, H*0.35), 250);
      setTimeout(()=>launch(W*0.5, H*0.5), 500);
      setTimeout(()=>container.remove(), 2200);
    } catch(e){}
  },
  autoSaveDraft() {
    // light save without sound
    try { localStorage.setItem(this.rkey(), JSON.stringify(this.record)); } catch(e){}
  },

  // ── Settings ──

  renderSettingsTabs() {

    });
    const c = document.getElementById('settings-content');
    const s = this.settingsDraft;
    const sec = (id, html)=>`<div class="settings-section ${this.settingsTab===id?'active':''}">${html}</div>`;

/span><div><b>개인정보 안심</b><br>모든 기록은 이 브라우저에만 저장돼요. 외부로 전송되지 않아요.</div></div>
        <div class="dn-row warn"><span class="dn-ico">⚠️</span><div><b>브라우저 데이터를 지우면 기록도 삭제</b><br>중요한 기록은 아래 <b>내보내기</b>로 백업해 두세요.</div></div>

    c.innerHTML = html;

  },
  bindSettingsTab() {
    const s = this.settingsDraft;
    const t = this.settingsTab;
    if (t==='info') {
      // 학급 전환·추가·삭제
      document.querySelectorAll('#class-switcher .class-chip[data-cid]').forEach(b=>b.onclick=()=>this.switchClass(b.dataset.cid));
      document.getElementById('class-add')?.addEventListener('click', ()=>this.addClass());
      document.getElementById('class-del')?.addEventListener('click', ()=>this.deleteClass(this.currentClassId));
      document.getElementById('f-class').oninput = e=> s.className = e.target.value;
      // 학교명 검색 → 학교명·급식 코드 자동 설정
      const box = document.getElementById('school-search-results');
      const doSearch = async ()=>{
        const name = document.getElementById('f-school-search').value.trim();
        if (!name) { box.innerHTML=''; return; }
        box.innerHTML = '<div class="hint">🔍 검색 중...</div>';
        try {
          const data = await this.neisRequest('schoolInfo', {pIndex:1, pSize:20, SCHUL_NM:name});
          const rows = data?.schoolInfo?.[1]?.row;
          if (!rows || !rows.length) { box.innerHTML='<div class="hint">검색 결과가 없어요. 학교명을 다시 확인해 주세요</div>'; return; }
          box.innerHTML = rows.map((r,i)=>`<div class="school-result" data-i="${i}">
              <div class="sr-name">🏫 ${esc(r.SCHUL_NM)}</div>
              <div class="sr-addr">${esc(r.ORG_RDNMA||'')}</div>
            </div>`).join('');
          box.querySelectorAll('.school-result').forEach(el=>el.onclick=()=>{
            const r = rows[+el.dataset.i];
            s.neisAtptCode = r.ATPT_OFCDC_SC_CODE;
            s.neisSchoolCode = r.SD_SCHUL_CODE;
            s.schoolName = r.SCHUL_NM;
            const st = document.getElementById('meal-link-status'); if (st) st.textContent = `✅ ${r.SCHUL_NM} — 급식 연동됨`;
            this.playSound('select');
            this.toast(`✅ ${r.SCHUL_NM} 선택됨`,'success');
            box.innerHTML = `<div class="hint">✅ 선택됨: ${esc(r.SCHUL_NM)}</div>`;
          });
        } catch(e){ box.innerHTML='<div class="hint">검색 실패 — 잠시 후 다시 시도해 주세요</div>'; }
      };
      document.getElementById('f-school-search-btn').onclick = doSearch;
      document.getElementById('f-school-search').addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); doSearch(); } });
      document.getElementById('f-test-meal').onclick = async ()=>{
        const r = document.getElementById('test-result');
        r.className='test-result';
        if (!s.neisAtptCode || !s.neisSchoolCode) { r.textContent='먼저 학교를 검색해 선택해 주세요'; return; }
        r.textContent='조회 중...';
        try {
          const data = await this.neisRequest('mealServiceDietInfo', {pIndex:1, pSize:1, ATPT_OFCDC_SC_CODE:s.neisAtptCode, SD_SCHUL_CODE:s.neisSchoolCode, MLSV_YMD:this.todayKey});
          if (data?.mealServiceDietInfo) {
            r.textContent = '✅ 성공!\n' + (data.mealServiceDietInfo[1].row[0].DDISH_NM||'').replace(/<br\/>/g,'\n');
          } else r.textContent = '⚠️ 데이터 없음 (오늘 급식이 없거나 코드 오류)';
        } catch(e){ r.textContent='❌ 호출 실패'; }
      };
    } else if (t==='students') {
      const addStudents = ()=>{
        const inp = document.getElementById('f-students-add');
        const ns = inp.value.split(/[,\n]/).map(x=>x.trim()).filter(x=>x);
        if (!ns.length) { inp.value=''; inp.focus(); return; }
        s.students = [...(s.students||[]), ...ns];
        this.playSound('select');
        this.renderSettingsTabs();
        const ni = document.getElementById('f-students-add'); if (ni) ni.focus(); // 연속 입력 위해 재포커스
      };
      document.getElementById('f-add-students').onclick = addStudents;
      document.getElementById('f-students-add').addEventListener('keydown', e=>{
        if (e.key==='Enter') { e.preventDefault(); addStudents(); }
      });
      document.querySelectorAll('#student-list button').forEach(b=>b.onclick=()=>{
        const i = +b.dataset.i, act = b.dataset.act;
        if (act==='del') s.students.splice(i,1);
        else if (act==='up' && i>0) [s.students[i-1],s.students[i]]=[s.students[i],s.students[i-1]];
        else if (act==='dn' && i<s.students.length-1) [s.students[i+1],s.students[i]]=[s.students[i],s.students[i+1]];
        this.renderSettingsTabs();
      });
    } else if (t==='timetable') {
      const saveCurrent = ()=>{
        const cur = [...document.querySelectorAll('.tt-pinp')].map(i=>i.value);
        localStorage.setItem(this.tkey(this.settingsDay), JSON.stringify({periods:cur}));
      };
      document.querySelectorAll('.tt-pinp').forEach(inp=>{ inp.oninput = saveCurrent; });
      document.querySelectorAll('.tt-day-tabs button').forEach(b=>b.onclick=()=>{
        saveCurrent();
        this.settingsDay = +b.dataset.day; this.renderSettingsTabs();
      });
      document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>{
        saveCurrent();
        const cur = [...document.querySelectorAll('.tt-pinp')].map(i=>i.value);
        localStorage.setItem(this.tkey(+b.dataset.copy), JSON.stringify({periods:cur}));
        this.toast('복사 완료!','success');
      });
    } else if (t==='book') {
      const upd = ()=>{
        s.bookUrl = document.getElementById('f-book-url').value.trim();
        s.bookTitle = document.getElementById('f-book-title').value;
        const id = s.bookUrl.match(/(?:youtu\.be\/|v=|shorts\/)([^&\n?#]+)/)?.[1];
        document.getElementById('book-preview').innerHTML = id
          ? `<img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" style="max-width:240px;border-radius:10px;margin-top:8px">`
          : '';
      };
      document.getElementById('f-book-url').oninput = upd;
      document.getElementById('f-book-title').oninput = upd;
      upd();
    } else if (t==='data') {
      document.getElementById('f-export').onclick = ()=> this.exportData();
      document.getElementById('f-import').onclick = ()=> document.getElementById('f-import-file').click();
      document.getElementById('f-import-file').onchange = e=> this.importData(e.target.files[0]);
      document.getElementById('f-clean').onclick = ()=>{
        if(confirm('60일 이전 기록을 모두 삭제할까요?')) { this.cleanOldRecords(); this.toast('삭제 완료','success'); this.renderSettingsTabs(); }
      };
    }
  },
  saveSettings() {
    // save current timetable tab inputs if open
    if (this.settingsTab==='timetable') {
      const cur = [...document.querySelectorAll('.tt-pinp')].map(i=>i.value);
      localStorage.setItem(this.tkey(this.settingsDay), JSON.stringify({periods:cur}));
    }
    this.settings = this.settingsDraft;
    this.settings.id = this.currentClassId;
    this.persistClasses();
    document.getElementById('school-info').textContent = `${this.settings.schoolName||''} · ${this.settings.className||''}`;
    this.playSound('save');
    this.toast('설정 저장 완료!','success');
    this.closeSettings();
    this.loadRecord();
    this.renderAll();
  },
  exportData() {
    const data = {};
    Object.keys(localStorage).filter(k=>k.startsWith('mc_')).forEach(k=>data[k]=localStorage.getItem(k));
    data._exportedAt = new Date().toISOString(); data._version = '2.2';
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `아침교실_백업_${this.todayKey}.json`; a.click();
    localStorage.setItem('mc_last_backup', new Date().toISOString());
    document.getElementById('backup-reminder')?.remove();
    this.toast('백업 완료 📤','success');
  },
  importData(file) {
    if (!file) return;
    if (!confirm('현재 데이터를 덮어쓸까요?')) return;
    const r = new FileReader();
    r.onload = ()=>{
      try {
        const data = JSON.parse(r.result);
        Object.keys(data).filter(k=>k.startsWith('mc_')).forEach(k=>localStorage.setItem(k, data[k]));
        this.toast('불러오기 완료 ✅','success');
        this.loadSettings();
        this.settingsDraft = JSON.parse(JSON.stringify(this.settings));
        this.loadRecord(); this.renderSettingsTabs(); this.renderAll();
      } catch(e){ this.toast('파일 오류','error'); }
    };
    r.readAsText(file);
  },

  // ── Records ──
  openRecords() {
    document.getElementById('records-overlay').classList.add('active');
    document.body.style.overflow='hidden';
    const keys = Object.keys(localStorage).filter(k=>k.startsWith('mc_record_'+this.classPrefix())).sort().reverse();
    if (!keys.length) {
      document.getElementById('records-body').innerHTML = '<div class="card-hint">아직 저장된 기록이 없어요 📭</div>';
      return;
    }
    const list = keys.map(k=>{
      const d = (k.match(/_(\d{8})$/)||[])[1] || '';
      const dateStr = `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
      let r={}; try{r=JSON.parse(localStorage.getItem(k))||{};}catch(e){}
      return `<div class="record-item" data-k="${k}">
        <div class="dt">${dateStr}</div>
        <div class="sm">${r.weather?.emoji||''} ${r.dust?.emoji||''}</div>
      </div>`;
    }).join('');
    document.getElementById('records-body').innerHTML = `<div class="records-list">${list}</div><div id="record-detail" style="margin-top:14px"></div>`;
    document.querySelectorAll('.record-item').forEach(el=>el.onclick=()=>{
      const r = JSON.parse(localStorage.getItem(el.dataset.k)||'{}');
      const k = el.dataset.k;
      const ems = Object.entries(r.emotions||{}).map(([n,v])=>`${esc(n)}: ${v.emoji} ${esc(v.label)}`).join(', ');
      const att = Object.entries(r.attendance||{}).map(([n,v])=>`${esc(n)}: ${esc(v)}`).join(', ');
      document.getElementById('record-detail').innerHTML = `<div class="record-detail">
        <h4>날씨</h4><div class="row">${r.weather?`${r.weather.emoji} ${r.weather.label}`:'-'}</div>
        <h4>미세먼지</h4><div class="row">${r.dust?`${r.dust.emoji} ${r.dust.label}`:'-'}</div>
        <h4>출석</h4><div class="row">${att||'-'}</div>
        <h4>오늘의 도우미</h4><div class="row">${(r.helpers||[]).filter(Boolean).map(esc).join(', ')||'-'}</div>
        <h4>감정</h4><div class="row">${ems||'-'}</div>
        <h4>유의사항</h4><div class="row" style="white-space:pre-wrap">${esc(r.notes||'-')}</div>
        <h4>급식</h4><div class="row" style="white-space:pre-wrap">${esc(r.mealText||'-')}</div>
        <button class="btn-test" style="background:var(--danger);margin-top:10px" onclick="if(confirm('정말 삭제할까요?')){localStorage.removeItem('${k}');App.openRecords();}">🗑️ 이 기록 삭제</button>
      </div>`;
    });
  },
  closeRecords() {
    const ov = document.getElementById('records-overlay');
    ov.classList.add('closing');
    setTimeout(()=>{ ov.classList.remove('active','closing'); document.body.style.overflow=''; },180);
  },

  openWelcome() {
    this.openPopup('🌅 환영합니다!', `
      <div class="welcome">
        <h2>아침교실에 오신 것을 환영해요!</h2>
        <p>먼저 학급 정보와 학생을 등록해 주세요.<br>설정은 언제든 ⚙️ 버튼에서 변경할 수 있어요.</p>
        <button id="welcome-btn">⚙️ 설정 시작하기</button>
      </div>`, {onMount:()=>{
        document.getElementById('welcome-btn').onclick = ()=>{ this.closePopup(); setTimeout(()=>this.openSettings(), 200); };
      }});
  }
};

document.addEventListener('DOMContentLoaded', ()=>App.init());
</script>
</body>
</html>
